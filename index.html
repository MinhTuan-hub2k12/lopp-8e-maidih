<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ 3D COSMIC ODYSSEY | Hiệu ứng đẹp nhất</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 100;
            pointer-events: none;
            font-size: 14px;
            letter-spacing: 1px;
            font-weight: 500;
            border-left: 3px solid #ff6b6b;
        }
        #controls {
            position: absolute;
            bottom: 25px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 0 20px;
        }
        button {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-size: 16px;
            letter-spacing: 1px;
        }
        button:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.6);
        }
        button:active {
            transform: scale(0.95);
        }
        #particleCount {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            button { padding: 6px 16px; font-size: 12px; }
            #info { font-size: 10px; top: 10px; left: 10px; }
        }
    </style>
</head>
<body>
    <div id="info">
        ✨ COSMIC ODYSSEY | 🖱️ Kéo chuột xoay 3D | 📜 Cuộn zoom
    </div>
    <div id="controls">
        <button id="colorBtn">🎨 Đổi màu vũ trụ</button>
        <button id="rotateBtn">🔄 Tự động xoay</button>
        <button id="explodeBtn">💥 Bùng nổ hạt</button>
        <button id="musicBtn">🎵 Bật nhạc nền</button>
    </div>
    <div id="particleCount">
        ⚡ Particle count: <span id="countValue">0</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- Setup scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.0008);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        // --- Effect Composer với Bloom (hiệu ứng phát sáng) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.8;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.autoRotateSpeed = 1.5;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.2;
        controls.rotateSpeed = 1.0;

        // --- Ánh sáng ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffaa88, 1, 30);
        pointLight.position.set(2, 3, 4);
        scene.add(pointLight);
        const backLight = new THREE.PointLight(0x4466ff, 0.5);
        backLight.position.set(-2, -1, -3);
        scene.add(backLight);
        
        // --- Tạo ngôi sao trung tâm (cầu lửa) ---
        const coreGeometry = new THREE.SphereGeometry(0.6, 64, 64);
        const coreMaterial = new THREE.MeshStandardMaterial({
            color: 0xff6600,
            emissive: 0xff2200,
            emissiveIntensity: 1.2,
            metalness: 0.8,
            roughness: 0.2
        });
        const core = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(core);
        
        // Thêm glow effect cho core bằng point light nhỏ
        const coreLight = new THREE.PointLight(0xff4400, 1.5, 15);
        core.add(coreLight);
        
        // --- Vòng tròn quỹ đạo (Toruses) ---
        const ringColors = [0xff3366, 0x33ff66, 0x33aaff, 0xffaa33];
        const rings = [];
        for (let i = 0; i < 4; i++) {
            const radius = 1.8 + i * 0.7;
            const tube = 0.04;
            const geometry = new THREE.TorusGeometry(radius, tube, 128, 200);
            const material = new THREE.MeshStandardMaterial({ color: ringColors[i], emissive: ringColors[i], emissiveIntensity: 0.5 });
            const ring = new THREE.Mesh(geometry, material);
            ring.rotation.x = Math.PI / 2;
            ring.rotation.z = i * Math.PI / 4;
            scene.add(ring);
            rings.push(ring);
        }
        
        // --- Hệ thống Particle (bụi vũ trụ) ---
        const particleCount = 4000;
        const particlesGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        
        for (let i = 0; i < particleCount; i++) {
            // Hình cầu xoắn ốc
            const radius = 2.5 + Math.random() * 4.5;
            const angle = Math.random() * Math.PI * 2;
            const height = (Math.random() - 0.5) * 3;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = height * 1.2;
            positions[i*3] = x;
            positions[i*3+1] = y;
            positions[i*3+2] = z;
            
            // Màu sắc theo vị trí
            const color = new THREE.Color().setHSL(0.55 + Math.random() * 0.2, 0.8, 0.6);
            colors[i*3] = color.r;
            colors[i*3+1] = color.g;
            colors[i*3+2] = color.b;
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const particleMaterial = new THREE.PointsMaterial({ size: 0.07, vertexColors: true, blending: THREE.AdditiveBlending });
        const particleSystem = new THREE.Points(particlesGeometry, particleMaterial);
        scene.add(particleSystem);
        
        document.getElementById('countValue').innerText = particleCount;
        
        // --- Particle thứ hai: bụi bay lơ lửng ---
        const dustCount = 2000;
        const dustGeo = new THREE.BufferGeometry();
        const dustPos = [];
        for (let i = 0; i < dustCount; i++) {
            dustPos.push((Math.random() - 0.5) * 15);
            dustPos.push((Math.random() - 0.5) * 10);
            dustPos.push((Math.random() - 0.5) * 12);
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dustPos), 3));
        const dustMat = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.03, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
        const dustSystem = new THREE.Points(dustGeo, dustMat);
        scene.add(dustSystem);
        
        // --- Tinh vân (sprite) ---
        const spriteMap = (() => {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(255,200,100,0)';
            ctx.fillRect(0, 0, 32, 32);
            ctx.beginPath();
            ctx.arc(16, 16, 12, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,180,80,0.7)';
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            ctx.shadowBlur = 0;
            return new THREE.CanvasTexture(canvas);
        })();
        
        const nebulaCount = 80;
        const nebulae = [];
        for (let i = 0; i < nebulaCount; i++) {
            const material = new THREE.SpriteMaterial({ map: spriteMap, color: 0xffaa66, blending: THREE.AdditiveBlending });
            const sprite = new THREE.Sprite(material);
            const rad = 3 + Math.random() * 4;
            const ang = Math.random() * Math.PI * 2;
            sprite.position.x = Math.cos(ang) * rad;
            sprite.position.z = Math.sin(ang) * rad;
            sprite.position.y = (Math.random() - 0.5) * 2.5;
            sprite.scale.set(0.2, 0.2, 1);
            scene.add(sprite);
            nebulae.push(sprite);
        }
        
        // --- Biến điều khiển ---
        let autoRotate = false;
        let explodeMode = false;
        let explodeTime = 0;
        let originalPositions = positions.slice();
        
        // --- Audio (tạo nhạc nền nhẹ bằng Web Audio API) ---
        let audioCtx = null;
        let isMusicOn = false;
        let osc1, osc2, gainNode;
        
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioCtx.createGain();
            gainNode.gain.value = 0.15;
            gainNode.connect(audioCtx.destination);
        }
        
        function startMusic() {
            if (isMusicOn) return;
            initAudio();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => playTone);
            }
            playTone();
        }
        
        function playTone() {
            if (isMusicOn) return;
            if (!audioCtx) return;
            osc1 = audioCtx.createOscillator();
            osc2 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            const gain2 = audioCtx.createGain();
            osc1.type = 'sine';
            osc2.type = 'triangle';
            osc1.frequency.value = 130.81; // C3
            osc2.frequency.value = 174.61;  // F3
            gain1.gain.value = 0.1;
            gain2.gain.value = 0.08;
            osc1.connect(gain1);
            osc2.connect(gain2);
            gain1.connect(gainNode);
            gain2.connect(gainNode);
            osc1.start();
            osc2.start();
            isMusicOn = true;
        }
        
        function stopMusic() {
            if (!isMusicOn) return;
            if (osc1) osc1.stop();
            if (osc2) osc2.stop();
            isMusicOn = false;
        }
        
        // --- Events ---
        document.getElementById('colorBtn').addEventListener('click', () => {
            const hue = Math.random();
            scene.background.setHSL(hue, 0.6, 0.05);
            scene.fog.color.setHSL(hue, 0.6, 0.05);
            bloomPass.strength = 0.5 + Math.random() * 1;
            coreMaterial.emissiveIntensity = 0.8 + Math.random() * 1;
        });
        
        document.getElementById('rotateBtn').addEventListener('click', () => {
            autoRotate = !autoRotate;
            controls.autoRotate = autoRotate;
            document.getElementById('rotateBtn').style.borderColor = autoRotate ? '#ff6b6b' : 'rgba(255,255,255,0.3)';
        });
        
        document.getElementById('explodeBtn').addEventListener('click', () => {
            explodeMode = true;
            explodeTime = 0;
            // Lưu vị trí gốc
            const posAttr = particlesGeometry.attributes.position.array;
            for (let i = 0; i < particleCount * 3; i++) {
                originalPositions[i] = posAttr[i];
            }
            // Bung ra xa
            for (let i = 0; i < particleCount; i++) {
                const idx = i * 3;
                const angle1 = Math.random() * Math.PI * 2;
                const angle2 = Math.random() * Math.PI * 2;
                const r = 5 + Math.random() * 8;
                posAttr[idx] = Math.sin(angle1) * Math.cos(angle2) * r;
                posAttr[idx+1] = Math.sin(angle1) * Math.sin(angle2) * r;
                posAttr[idx+2] = Math.cos(angle1) * r;
            }
            particlesGeometry.attributes.position.needsUpdate = true;
            setTimeout(() => {
                explodeMode = false;
                // Trả về từ từ
                for (let i = 0; i < particleCount * 3; i++) {
                    particlesGeometry.attributes.position.array[i] = originalPositions[i];
                }
                particlesGeometry.attributes.position.needsUpdate = true;
            }, 1500);
        });
        
        document.getElementById('musicBtn').addEventListener('click', () => {
            if (isMusicOn) {
                stopMusic();
                document.getElementById('musicBtn').style.opacity = '0.6';
            } else {
                startMusic();
                document.getElementById('musicBtn').style.opacity = '1';
            }
        });
        
        // --- Animation loop ---
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            
            // Xoay các vòng tròn
            rings.forEach((ring, idx) => {
                ring.rotation.z += 0.005 * (idx + 1);
                ring.rotation.x = Math.PI / 2 + Math.sin(time * 0.5 + idx) * 0.1;
            });
            
            // Xoay hệ hạt chậm
            particleSystem.rotation.y += 0.002;
            dustSystem.rotation.x += 0.001;
            dustSystem.rotation.y += 0.0015;
            
            // Làm nhấp nháy core
            const intensity = 1.2 + Math.sin(time * 8) * 0.4;
            coreLight.intensity = intensity;
            coreMaterial.emissiveIntensity = 0.8 + Math.sin(time * 5) * 0.3;
            
            // Di chuyển tinh vân nhẹ
            nebulae.forEach((neb, i) => {
                neb.position.x += Math.sin(time + i) * 0.002;
                neb.position.y += Math.cos(time * 0.7 + i) * 0.001;
            });
            
            // Cập nhật controls
            controls.update();
            
            // Render với EffectComposer
            effectComposer.render();
        }
        
        animate();
        
        // Resize handler
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Console log
        console.log('%c✨ COSMIC ODYSSEY LOADED | Enjoy the 3D universe! ✨', 'color: #ff6b6b; font-size: 16px; font-weight: bold;');
    </script>
</body>
</html>
