<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8E Social - Mạng xã hội lớp 8E</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: #f0f2f5;
        }
        
        /* Facebook style scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f0f2f5;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #bcc0c4;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #8a8e92;
        }
        
        /* Story ring */
        .story-ring {
            background: linear-gradient(45deg, #f09433, #d62976, #962fbf);
        }
        
        .post-card {
            transition: all 0.2s ease;
        }
        
        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        
        .friend-request-card {
            transition: all 0.2s ease;
        }
        
        .friend-request-card:hover {
            background: #f0f2f5;
            transform: translateX(4px);
        }
        
        /* Modal animation */
        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .modal-animation {
            animation: modalFadeIn 0.2s ease-out;
        }
        
        /* Server card */
        .server-card {
            transition: all 0.2s ease;
        }
        
        .server-card:hover {
            background: #e4e6e9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ==================== DỮ LIỆU ====================
        let currentUser = null;
        let users = [];
        let servers = [];
        let posts = [];
        let messages = [];
        let friendRequests = [];
        
        // Load/Save functions
        function loadData() {
            const savedUser = localStorage.getItem('8e_currentUser');
            if (savedUser && savedUser !== 'null') {
                try {
                    currentUser = JSON.parse(savedUser);
                } catch(e) { currentUser = null; }
            } else {
                currentUser = null;
            }
            
            const savedUsers = localStorage.getItem('8e_users');
            users = savedUsers ? JSON.parse(savedUsers) : [];
            
            const savedServers = localStorage.getItem('8e_servers');
            servers = savedServers ? JSON.parse(savedServers) : [];
            
            const savedPosts = localStorage.getItem('8e_posts');
            posts = savedPosts ? JSON.parse(savedPosts) : [];
            
            const savedMessages = localStorage.getItem('8e_messages');
            messages = savedMessages ? JSON.parse(savedMessages) : [];
            
            const savedRequests = localStorage.getItem('8e_friendRequests');
            friendRequests = savedRequests ? JSON.parse(savedRequests) : [];
        }
        
        function saveData() {
            localStorage.setItem('8e_currentUser', JSON.stringify(currentUser));
            localStorage.setItem('8e_users', JSON.stringify(users));
            localStorage.setItem('8e_servers', JSON.stringify(servers));
            localStorage.setItem('8e_posts', JSON.stringify(posts));
            localStorage.setItem('8e_messages', JSON.stringify(messages));
            localStorage.setItem('8e_friendRequests', JSON.stringify(friendRequests));
        }
        
        // Helper functions
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'Vừa xong';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} phút trước`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} giờ trước`;
            if (diff < 604800000) return `${Math.floor(diff / 86400000)} ngày trước`;
            return date.toLocaleDateString('vi-VN');
        }
        
        function getUserById(userId) {
            return users.find(u => u.id === userId);
        }
        
        function isFriend(userId) {
            if (!currentUser) return false;
            const user = users.find(u => u.id === currentUser.id);
            return user?.friends?.includes(userId) || false;
        }
        
        function hasSentRequest(toUserId) {
            return friendRequests.some(r => r.fromUserId === currentUser?.id && r.toUserId === toUserId && r.status === 'pending');
        }
        
        function hasReceivedRequest(fromUserId) {
            return friendRequests.some(r => r.fromUserId === fromUserId && r.toUserId === currentUser?.id && r.status === 'pending');
        }
        
        // ==================== AUTH ====================
        function handleRegister(e) {
            e.preventDefault();
            const fullName = document.getElementById('regFullName').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            
            if (!fullName || !username || !password) {
                alert('❌ Vui lòng nhập đầy đủ thông tin!');
                return;
            }
            
            if (password !== confirm) {
                alert('❌ Mật khẩu xác nhận không khớp!');
                return;
            }
            
            if (password.length < 4) {
                alert('❌ Mật khẩu phải có ít nhất 4 ký tự!');
                return;
            }
            
            if (users.find(u => u.username === username)) {
                alert('❌ Tên đăng nhập đã tồn tại!');
                return;
            }
            
            const newUser = {
                id: Date.now().toString(),
                fullName: fullName,
                username: username,
                password: password,
                avatar: `https://ui-avatars.com/api/?background=5865F2&color=fff&name=${encodeURIComponent(fullName)}`,
                bio: 'Học sinh lớp 8E 🎓',
                background: 'https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=800',
                friends: [],
                servers: [],
                createdAt: new Date().toISOString()
            };
            
            users.push(newUser);
            saveData();
            
            alert('✅ Đăng ký thành công! Vui lòng đăng nhập.');
            currentView = 'login';
            renderApp();
        }
        
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            const user = users.find(u => u.username === username && u.password === password);
            if (user) {
                currentUser = { ...user };
                delete currentUser.password;
                saveData();
                currentView = 'feed';
                renderApp();
            } else {
                alert('❌ Sai tên đăng nhập hoặc mật khẩu!');
            }
        }
        
        function logout() {
            currentUser = null;
            saveData();
            currentView = 'welcome';
            renderApp();
        }
        
        // ==================== FRIEND ACTIONS ====================
        function sendFriendRequest(userId) {
            if (!currentUser) return;
            if (isFriend(userId)) {
                alert('Các bạn đã là bạn bè rồi!');
                return;
            }
            if (hasSentRequest(userId)) {
                alert('Đã gửi lời mời kết bạn rồi!');
                return;
            }
            
            friendRequests.push({
                id: Date.now().toString(),
                fromUserId: currentUser.id,
                toUserId: userId,
                status: 'pending',
                createdAt: new Date().toISOString()
            });
            saveData();
            renderApp();
        }
        
        function acceptFriendRequest(requestId, fromUserId) {
            friendRequests = friendRequests.filter(r => r.id !== requestId);
            
            const currentUserData = users.find(u => u.id === currentUser.id);
            const fromUserData = users.find(u => u.id === fromUserId);
            
            if (!currentUserData.friends) currentUserData.friends = [];
            if (!fromUserData.friends) fromUserData.friends = [];
            
            currentUserData.friends.push(fromUserId);
            fromUserData.friends.push(currentUser.id);
            
            currentUser = { ...currentUserData };
            delete currentUser.password;
            
            saveData();
            renderApp();
        }
        
        function rejectFriendRequest(requestId) {
            friendRequests = friendRequests.filter(r => r.id !== requestId);
            saveData();
            renderApp();
        }
        
        // ==================== SERVER ACTIONS ====================
        function createServer() {
            if (!currentUser) return;
            
            const name = prompt('🏷️ Tên server:', `Server của ${currentUser.fullName}`);
            if (!name) return;
            
            const inviteCode = Math.random().toString(36).substring(2, 10).toUpperCase();
            
            const newServer = {
                id: Date.now().toString(),
                name: name,
                ownerId: currentUser.id,
                members: [currentUser.id],
                inviteCode: inviteCode,
                channels: [{ id: 'general', name: 'chung' }],
                messages: [],
                createdAt: new Date().toISOString()
            };
            
            servers.push(newServer);
            
            const userData = users.find(u => u.id === currentUser.id);
            if (!userData.servers) userData.servers = [];
            userData.servers.push(newServer.id);
            
            currentUser = { ...userData };
            delete currentUser.password;
            
            saveData();
            renderApp();
            
            // Tạo link mời
            const link = `${window.location.origin}${window.location.pathname}?invite=${inviteCode}`;
            alert(`✅ Đã tạo server "${name}"!\n\n🔗 Link mời: ${link}\n📋 Mã mời: ${inviteCode}\n\nGửi link này cho bạn bè để họ tham gia!`);
        }
        
        function joinServerByCode() {
            const code = prompt('🔑 Nhập mã mời server:');
            if (!code) return;
            
            const server = servers.find(s => s.inviteCode === code.toUpperCase());
            if (!server) {
                alert('❌ Mã mời không hợp lệ!');
                return;
            }
            
            if (server.members.includes(currentUser.id)) {
                alert('Bạn đã ở trong server này rồi!');
                return;
            }
            
            server.members.push(currentUser.id);
            
            const userData = users.find(u => u.id === currentUser.id);
            if (!userData.servers) userData.servers = [];
            userData.servers.push(server.id);
            
            currentUser = { ...userData };
            delete currentUser.password;
            
            saveData();
            alert(`✅ Đã tham gia server "${server.name}"!`);
            renderApp();
        }
        
        // ==================== POST ACTIONS ====================
        function createPost(content) {
            if (!content.trim()) return;
            
            const newPost = {
                id: Date.now().toString(),
                userId: currentUser.id,
                userName: currentUser.fullName,
                userAvatar: currentUser.avatar,
                content: content,
                likes: [],
                comments: [],
                createdAt: new Date().toISOString()
            };
            
            posts.unshift(newPost);
            saveData();
            renderApp();
        }
        
        function likePost(postId) {
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            
            if (post.likes.includes(currentUser.id)) {
                post.likes = post.likes.filter(id => id !== currentUser.id);
            } else {
                post.likes.push(currentUser.id);
            }
            saveData();
            renderApp();
        }
        
        function addComment(postId, content) {
            if (!content.trim()) return;
            
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            
            post.comments.push({
                id: Date.now().toString(),
                userId: currentUser.id,
                userName: currentUser.fullName,
                userAvatar: currentUser.avatar,
                content: content,
                createdAt: new Date().toISOString()
            });
            saveData();
            renderApp();
        }
        
        // ==================== PROFILE ====================
        function updateProfile() {
            const newBio = document.getElementById('editBio')?.value;
            const newFullName = document.getElementById('editFullName')?.value;
            const newAvatar = document.getElementById('editAvatar')?.value;
            
            if (newFullName) currentUser.fullName = newFullName;
            if (newBio) currentUser.bio = newBio;
            if (newAvatar && newAvatar.trim()) currentUser.avatar = newAvatar;
            
            const userData = users.find(u => u.id === currentUser.id);
            userData.fullName = currentUser.fullName;
            userData.bio = currentUser.bio;
            if (newAvatar && newAvatar.trim()) userData.avatar = currentUser.avatar;
            
            saveData();
            alert('✅ Cập nhật trang cá nhân thành công!');
            currentView = 'profile';
            renderApp();
        }
        
        // ==================== GIAO DIỆN ====================
        let currentView = 'welcome';
        let selectedServer = null;
        let selectedChatUser = null;
        
        // Màn hình chào mừng
        function WelcomeScreen() {
            return `
                <div class="min-h-screen bg-gradient-to-br from-[#5865F2] to-[#4752C4] flex items-center justify-center p-4">
                    <div class="max-w-md w-full text-center">
                        <div class="text-7xl mb-6">🎓</div>
                        <h1 class="text-4xl font-bold text-white mb-2">8E Social</h1>
                        <p class="text-white/80 mb-8">Mạng xã hội dành riêng cho lớp 8E</p>
                        <div class="space-y-3">
                            <button id="loginBtn" class="w-full bg-white text-[#5865F2] py-3 rounded-xl font-semibold hover:shadow-lg transition">Đăng nhập</button>
                            <button id="registerBtn" class="w-full bg-transparent border-2 border-white text-white py-3 rounded-xl font-semibold hover:bg-white/10 transition">Đăng ký</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Đăng nhập
        function LoginScreen() {
            return `
                <div class="min-h-screen bg-gradient-to-br from-[#5865F2] to-[#4752C4] flex items-center justify-center p-4">
                    <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl">
                        <div class="text-center mb-6">
                            <h2 class="text-2xl font-bold text-gray-800">Đăng nhập 8E Social</h2>
                            <p class="text-gray-500 text-sm mt-1">Chào mừng bạn trở lại!</p>
                        </div>
                        <form id="loginForm">
                            <input type="text" id="loginUsername" placeholder="Tên đăng nhập" class="w-full p-3 border rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-[#5865F2]" autocomplete="off">
                            <input type="password" id="loginPassword" placeholder="Mật khẩu" class="w-full p-3 border rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-[#5865F2]">
                            <button type="submit" class="w-full bg-[#5865F2] text-white py-3 rounded-xl font-semibold hover:bg-[#4752C4] transition">Đăng nhập</button>
                        </form>
                        <p class="text-center text-gray-500 text-sm mt-4">
                            Chưa có tài khoản? 
                            <button id="switchToRegister" class="text-[#5865F2] font-semibold">Đăng ký</button>
                        </p>
                    </div>
                </div>
            `;
        }
        
        // Đăng ký
        function RegisterScreen() {
            return `
                <div class="min-h-screen bg-gradient-to-br from-[#5865F2] to-[#4752C4] flex items-center justify-center p-4">
                    <div class="bg-white rounded-2xl p-8 w-full max-w-md shadow-2xl">
                        <div class="text-center mb-6">
                            <h2 class="text-2xl font-bold text-gray-800">Tham gia 8E Social</h2>
                            <p class="text-gray-500 text-sm mt-1">Tạo tài khoản mới</p>
                        </div>
                        <form id="registerForm">
                            <input type="text" id="regFullName" placeholder="Họ và tên" class="w-full p-3 border rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-[#5865F2]">
                            <input type="text" id="regUsername" placeholder="Tên đăng nhập" class="w-full p-3 border rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-[#5865F2]" autocomplete="off">
                            <input type="password" id="regPassword" placeholder="Mật khẩu" class="w-full p-3 border rounded-xl mb-3 focus:outline-none focus:ring-2 focus:ring-[#5865F2]">
                            <input type="password" id="regConfirmPassword" placeholder="Xác nhận mật khẩu" class="w-full p-3 border rounded-xl mb-4 focus:outline-none focus:ring-2 focus:ring-[#5865F2]">
                            <button type="submit" class="w-full bg-[#5865F2] text-white py-3 rounded-xl font-semibold hover:bg-[#4752C4] transition">Đăng ký</button>
                        </form>
                        <p class="text-center text-gray-500 text-sm mt-4">
                            Đã có tài khoản? 
                            <button id="switchToLogin" class="text-[#5865F2] font-semibold">Đăng nhập</button>
                        </p>
                    </div>
                </div>
            `;
        }
        
        // Main Feed (Facebook style)
        function FeedView() {
            const friendList = users.filter(u => currentUser.friends?.includes(u.id));
            const pendingRequests = friendRequests.filter(r => r.toUserId === currentUser.id && r.status === 'pending');
            const myServers = servers.filter(s => s.members.includes(currentUser.id));
            
            return `
                <div class="min-h-screen bg-gray-100">
                    <!-- Header Facebook style -->
                    <div class="bg-white shadow-sm sticky top-0 z-10">
                        <div class="max-w-6xl mx-auto px-4 py-2 flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <div class="text-2xl font-bold bg-gradient-to-r from-[#5865F2] to-[#EB459E] bg-clip-text text-transparent">8E Social</div>
                            </div>
                            <div class="flex items-center gap-3">
                                <button id="createServerBtn" class="p-2 hover:bg-gray-100 rounded-full" title="Tạo server"><i class="fas fa-plus-circle text-[#5865F2] text-xl"></i></button>
                                <button id="joinServerBtn" class="p-2 hover:bg-gray-100 rounded-full" title="Tham gia server"><i class="fas fa-sign-in-alt text-green-500 text-xl"></i></button>
                                <button id="profileBtn" class="flex items-center gap-2 p-1 hover:bg-gray-100 rounded-full">
                                    <img src="${currentUser.avatar}" class="w-8 h-8 rounded-full object-cover">
                                    <span class="hidden md:inline text-sm font-medium">${currentUser.fullName}</span>
                                </button>
                                <button id="logoutBtn" class="p-2 hover:bg-gray-100 rounded-full" title="Đăng xuất"><i class="fas fa-sign-out-alt text-gray-600 text-xl"></i></button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="max-w-6xl mx-auto px-4 py-6">
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <!-- Left sidebar - Friends & Servers -->
                            <div class="lg:col-span-1 space-y-4">
                                <!-- Friend requests -->
                                ${pendingRequests.length > 0 ? `
                                    <div class="bg-white rounded-xl p-4 shadow">
                                        <h3 class="font-semibold text-gray-700 mb-3">Lời mời kết bạn</h3>
                                        ${pendingRequests.map(req => {
                                            const fromUser = getUserById(req.fromUserId);
                                            return `
                                                <div class="friend-request-card flex items-center justify-between p-2 rounded-lg">
                                                    <div class="flex items-center gap-3">
                                                        <img src="${fromUser.avatar}" class="w-10 h-10 rounded-full object-cover">
                                                        <div>
                                                            <p class="font-medium">${fromUser.fullName}</p>
                                                            <p class="text-xs text-gray-500">@${fromUser.username}</p>
                                                        </div>
                                                    </div>
                                                    <div class="flex gap-2">
                                                        <button class="accept-friend p-1 px-3 bg-[#5865F2] text-white rounded-full text-sm" data-request-id="${req.id}" data-user-id="${req.fromUserId}">Đồng ý</button>
                                                        <button class="reject-friend p-1 px-3 bg-gray-300 rounded-full text-sm" data-request-id="${req.id}">Từ chối</button>
                                                    </div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                ` : ''}
                                
                                <!-- Servers -->
                                <div class="bg-white rounded-xl p-4 shadow">
                                    <div class="flex justify-between items-center mb-3">
                                        <h3 class="font-semibold text-gray-700">Server của bạn</h3>
                                        <button id="createServerBtn2" class="text-[#5865F2] text-sm">+ Tạo mới</button>
                                    </div>
                                    ${myServers.length === 0 ? `
                                        <p class="text-gray-400 text-sm text-center py-4">Chưa có server nào<br>Tạo server để trò chuyện với bạn bè</p>
                                    ` : `
                                        <div class="space-y-2">
                                            ${myServers.map(s => `
                                                <div class="server-card flex items-center gap-3 p-2 rounded-lg cursor-pointer" data-server-id="${s.id}">
                                                    <div class="w-10 h-10 bg-gradient-to-r from-[#5865F2] to-[#EB459E] rounded-full flex items-center justify-center text-white font-bold">${s.name.charAt(0)}</div>
                                                    <div class="flex-1">
                                                        <p class="font-medium">${s.name}</p>
                                                        <p class="text-xs text-gray-500">${s.members.length} thành viên</p>
                                                    </div>
                                                    <i class="fas fa-chevron-right text-gray-400"></i>
                                                </div>
                                            `).join('')}
                                        </div>
                                    `}
                                </div>
                                
                                <!-- Friends -->
                                <div class="bg-white rounded-xl p-4 shadow">
                                    <h3 class="font-semibold text-gray-700 mb-3">Bạn bè (${friendList.length})</h3>
                                    ${friendList.length === 0 ? `
                                        <p class="text-gray-400 text-sm text-center py-4">Chưa có bạn bè<br>Hãy kết bạn để bắt đầu trò chuyện</p>
                                    ` : `
                                        <div class="space-y-2 max-h-80 overflow-y-auto">
                                            ${friendList.map(friend => `
                                                <div class="flex items-center justify-between p-2 rounded-lg hover:bg-gray-50">
                                                    <div class="flex items-center gap-3">
                                                        <img src="${friend.avatar}" class="w-10 h-10 rounded-full object-cover">
                                                        <div>
                                                            <p class="font-medium">${friend.fullName}</p>
                                                            <p class="text-xs text-gray-500">@${friend.username}</p>
                                                        </div>
                                                    </div>
                                                    <button class="chat-user p-2 text-[#5865F2] hover:bg-gray-100 rounded-full" data-user-id="${friend.id}" data-user-name="${friend.fullName}" data-user-avatar="${friend.avatar}">
                                                        <i class="fas fa-comment"></i>
                                                    </button>
                                                </div>
                                            `).join('')}
                                        </div>
                                    `}
                                </div>
                            </div>
                            
                            <!-- Main feed -->
                            <div class="lg:col-span-2 space-y-4">
                                <!-- Create post -->
                                <div class="bg-white rounded-xl p-4 shadow">
                                    <div class="flex gap-3">
                                        <img src="${currentUser.avatar}" class="w-10 h-10 rounded-full object-cover">
                                        <input type="text" id="postContent" placeholder="Bạn đang nghĩ gì?" class="flex-1 p-3 bg-gray-100 rounded-full outline-none focus:ring-2 focus:ring-[#5865F2]">
                                    </div>
                                    <div class="flex justify-end mt-3">
                                        <button id="submitPostBtn" class="px-6 py-2 bg-[#5865F2] text-white rounded-full font-semibold hover:bg-[#4752C4]">Đăng</button>
                                    </div>
                                </div>
                                
                                <!-- Posts feed -->
                                ${posts.length === 0 ? `
                                    <div class="bg-white rounded-xl p-8 text-center shadow">
                                        <div class="text-6xl mb-4">📝</div>
                                        <p class="text-gray-500">Chưa có bài viết nào</p>
                                        <p class="text-sm text-gray-400">Hãy đăng bài viết đầu tiên của bạn!</p>
                                    </div>
                                ` : posts.map(post => {
                                    const isLiked = post.likes.includes(currentUser.id);
                                    return `
                                        <div class="bg-white rounded-xl shadow overflow-hidden">
                                            <div class="p-4">
                                                <div class="flex items-center gap-3 mb-3">
                                                    <img src="${post.userAvatar}" class="w-10 h-10 rounded-full object-cover">
                                                    <div>
                                                        <p class="font-semibold">${post.userName}</p>
                                                        <p class="text-xs text-gray-500">${formatTime(post.createdAt)}</p>
                                                    </div>
                                                </div>
                                                <p class="text-gray-700 mb-3">${escapeHtml(post.content)}</p>
                                                <div class="flex gap-4 border-t pt-3">
                                                    <button class="like-post flex items-center gap-2 text-sm ${isLiked ? 'text-[#5865F2]' : 'text-gray-500'}" data-post-id="${post.id}">
                                                        <i class="fas fa-heart"></i> ${post.likes.length} Thích
                                                    </button>
                                                    <button class="comment-toggle flex items-center gap-2 text-sm text-gray-500" data-post-id="${post.id}">
                                                        <i class="fas fa-comment"></i> ${post.comments.length} Bình luận
                                                    </button>
                                                </div>
                                                <div class="comments-section hidden mt-3 pt-3 border-t" id="comments-${post.id}">
                                                    ${post.comments.map(comment => `
                                                        <div class="flex gap-2 mb-2">
                                                            <img src="${comment.userAvatar}" class="w-6 h-6 rounded-full object-cover">
                                                            <div class="flex-1 bg-gray-100 rounded-lg p-2">
                                                                <p class="text-xs font-semibold">${comment.userName}</p>
                                                                <p class="text-sm">${escapeHtml(comment.content)}</p>
                                                            </div>
                                                        </div>
                                                    `).join('')}
                                                    <div class="flex gap-2 mt-2">
                                                        <img src="${currentUser.avatar}" class="w-6 h-6 rounded-full object-cover">
                                                        <input type="text" class="comment-input flex-1 p-2 bg-gray-100 rounded-full text-sm outline-none" placeholder="Viết bình luận..." data-post-id="${post.id}">
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Chat modal -->
                <div id="chatModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
                    <div class="bg-white rounded-xl w-full max-w-md h-96 flex flex-col modal-animation">
                        <div class="p-3 border-b flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <img id="chatAvatar" src="" class="w-8 h-8 rounded-full object-cover">
                                <span id="chatName" class="font-semibold"></span>
                            </div>
                            <button id="closeChatModal" class="text-gray-500 hover:text-gray-700"><i class="fas fa-times text-xl"></i></button>
                        </div>
                        <div id="chatMessages" class="flex-1 overflow-y-auto p-3 space-y-2"></div>
                        <div class="p-3 border-t flex gap-2">
                            <input type="text" id="chatInput" placeholder="Nhập tin nhắn..." class="flex-1 p-2 border rounded-full outline-none focus:ring-2 focus:ring-[#5865F2]">
                            <button id="sendChatBtn" class="bg-[#5865F2] text-white px-4 py-2 rounded-full">Gửi</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Profile page
        function ProfileView() {
            return `
                <div class="min-h-screen bg-gray-100">
                    <div class="bg-white shadow-sm sticky top-0 z-10">
                        <div class="max-w-4xl mx-auto px-4 py-2 flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <button id="backToFeed" class="p-2 hover:bg-gray-100 rounded-full"><i class="fas fa-arrow-left text-xl"></i></button>
                                <div class="text-xl font-bold bg-gradient-to-r from-[#5865F2] to-[#EB459E] bg-clip-text text-transparent">8E Social</div>
                            </div>
                            <button id="logoutBtn" class="p-2 hover:bg-gray-100 rounded-full"><i class="fas fa-sign-out-alt text-gray-600 text-xl"></i></button>
                        </div>
                    </div>
                    
                    <div class="max-w-4xl mx-auto">
                        <!-- Cover photo -->
                        <div class="relative h-64 bg-gradient-to-r from-[#5865F2] to-[#EB459E] rounded-b-2xl">
                            <img src="${currentUser.background}" class="w-full h-full object-cover rounded-b-2xl">
                            <div class="absolute -bottom-16 left-8">
                                <img src="${currentUser.avatar}" class="w-32 h-32 rounded-full border-4 border-white object-cover">
                            </div>
                        </div>
                        
                        <!-- Profile info -->
                        <div class="bg-white rounded-xl shadow mx-4 mt-20 p-6">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h1 class="text-2xl font-bold">${currentUser.fullName}</h1>
                                    <p class="text-gray-500">@${currentUser.username}</p>
                                    <p class="text-gray-700 mt-2">${currentUser.bio}</p>
                                </div>
                                <button id="editProfileBtn" class="px-4 py-2 bg-gray-200 rounded-full text-sm font-semibold hover:bg-gray-300">Chỉnh sửa</button>
                            </div>
                            
                            <div class="flex gap-6 mt-4 pt-4 border-t">
                                <div><span class="font-bold">${currentUser.friends?.length || 0}</span> <span class="text-gray-500">bạn bè</span></div>
                                <div><span class="font-bold">${currentUser.servers?.length || 0}</span> <span class="text-gray-500">server</span></div>
                            </div>
                        </div>
                        
                        <!-- Edit profile modal -->
                        <div id="editModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
                            <div class="bg-white rounded-xl p-6 w-full max-w-md modal-animation">
                                <h3 class="text-xl font-bold mb-4">Chỉnh sửa trang cá nhân</h3>
                                <div class="space-y-3">
                                    <input type="text" id="editFullName" placeholder="Họ và tên" class="w-full p-3 border rounded-xl" value="${currentUser.fullName}">
                                    <textarea id="editBio" placeholder="Tiểu sử" rows="3" class="w-full p-3 border rounded-xl">${currentUser.bio}</textarea>
                                    <input type="text" id="editAvatar" placeholder="URL ảnh đại diện" class="w-full p-3 border rounded-xl" value="${currentUser.avatar}">
                                    <div class="flex gap-3">
                                        <button id="saveProfileBtn" class="flex-1 bg-[#5865F2] text-white py-2 rounded-xl font-semibold">Lưu</button>
                                        <button id="closeEditModal" class="flex-1 bg-gray-200 py-2 rounded-xl font-semibold">Hủy</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ==================== RENDER ====================
        function renderApp() {
            loadData();
            
            const app = document.getElementById('app');
            let html = '';
            
            if (!currentUser) {
                if (currentView === 'login') html = LoginScreen();
                else if (currentView === 'register') html = RegisterScreen();
                else html = WelcomeScreen();
            } else {
                if (currentView === 'profile') html = ProfileView();
                else html = FeedView();
            }
            
            app.innerHTML = html;
            attachEvents();
        }
        
        function attachEvents() {
            if (!currentUser) {
                // Welcome screen
                const loginBtn = document.getElementById('loginBtn');
                const registerBtn = document.getElementById('registerBtn');
                if (loginBtn) loginBtn.onclick = () => { currentView = 'login'; renderApp(); };
                if (registerBtn) registerBtn.onclick = () => { currentView = 'register'; renderApp(); };
                
                // Login screen
                const loginForm = document.getElementById('loginForm');
                if (loginForm) loginForm.onsubmit = handleLogin;
                const switchToRegister = document.getElementById('switchToRegister');
                if (switchToRegister) switchToRegister.onclick = () => { currentView = 'register'; renderApp(); };
                
                // Register screen
                const registerForm = document.getElementById('registerForm');
                if (registerForm) registerForm.onsubmit = handleRegister;
                const switchToLogin = document.getElementById('switchToLogin');
                if (switchToLogin) switchToLogin.onclick = () => { currentView = 'login'; renderApp(); };
            } else {
                // Feed view
                const createServerBtn = document.getElementById('createServerBtn');
                const createServerBtn2 = document.getElementById('createServerBtn2');
                const joinServerBtn = document.getElementById('joinServerBtn');
                const profileBtn = document.getElementById('profileBtn');
                const logoutBtn = document.getElementById('logoutBtn');
                const submitPostBtn = document.getElementById('submitPostBtn');
                const postContent = document.getElementById('postContent');
                
                if (createServerBtn) createServerBtn.onclick = createServer;
                if (createServerBtn2) createServerBtn2.onclick = createServer;
                if (joinServerBtn) joinServerBtn.onclick = joinServerByCode;
                if (profileBtn) profileBtn.onclick = () => { currentView = 'profile'; renderApp(); };
                if (logoutBtn) logoutBtn.onclick = logout;
                if (submitPostBtn && postContent) submitPostBtn.onclick = () => { createPost(postContent.value); };
                if (postContent) postContent.onkeypress = (e) => { if (e.key === 'Enter') createPost(postContent.value); };
                
                // Like buttons
                document.querySelectorAll('.like-post').forEach(btn => {
                    btn.onclick = () => likePost(btn.dataset.postId);
                });
                
                // Comment toggle
                document.querySelectorAll('.comment-toggle').forEach(btn => {
                    btn.onclick = () => {
                        const commentsDiv = document.getElementById(`comments-${btn.dataset.postId}`);
                        if (commentsDiv) commentsDiv.classList.toggle('hidden');
                    };
                });
                
                // Comment inputs
                document.querySelectorAll('.comment-input').forEach(input => {
                    input.onkeypress = (e) => {
                        if (e.key === 'Enter') {
                            addComment(input.dataset.postId, input.value);
                            input.value = '';
                        }
                    };
                });
                
                // Friend requests
                document.querySelectorAll('.accept-friend').forEach(btn => {
                    btn.onclick = () => acceptFriendRequest(btn.dataset.requestId, btn.dataset.userId);
                });
                document.querySelectorAll('.reject-friend').forEach(btn => {
                    btn.onclick = () => rejectFriendRequest(btn.dataset.requestId);
                });
                
                // Chat
                let currentChatUser = null;
                const chatModal = document.getElementById('chatModal');
                const closeChatModal = document.getElementById('closeChatModal');
                const sendChatBtn = document.getElementById('sendChatBtn');
                const chatInput = document.getElementById('chatInput');
                
                document.querySelectorAll('.chat-user').forEach(btn => {
                    btn.onclick = () => {
                        currentChatUser = {
                            id: btn.dataset.userId,
                            name: btn.dataset.userName,
                            avatar: btn.dataset.userAvatar
                        };
                        document.getElementById('chatName').innerText = currentChatUser.name;
                        document.getElementById('chatAvatar').src = currentChatUser.avatar;
                        loadChatMessages();
                        chatModal.classList.remove('hidden');
                        chatModal.classList.add('flex');
                    };
                });
                
                function loadChatMessages() {
                    const chatMessagesDiv = document.getElementById('chatMessages');
                    const chatMsgs = messages.filter(m => 
                        (m.fromUserId === currentUser.id && m.toUserId === currentChatUser.id) ||
                        (m.fromUserId === currentChatUser.id && m.toUserId === currentUser.id)
                    );
                    chatMessagesDiv.innerHTML = chatMsgs.map(m => `
                        <div class="flex ${m.fromUserId === currentUser.id ? 'justify-end' : 'justify-start'}">
                            <div class="max-w-[70%] ${m.fromUserId === currentUser.id ? 'bg-[#5865F2] text-white' : 'bg-gray-200'} rounded-lg p-2">
                                <p class="text-sm">${escapeHtml(m.content)}</p>
                                <p class="text-xs opacity-70 mt-1">${formatTime(m.timestamp)}</p>
                            </div>
                        </div>
                    `).join('');
                    chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
                }
                
                if (sendChatBtn && chatInput) {
                    sendChatBtn.onclick = () => {
                        if (chatInput.value.trim() && currentChatUser) {
                            messages.push({
                                id: Date.now().toString(),
                                fromUserId: currentUser.id,
                                toUserId: currentChatUser.id,
                                content: chatInput.value.trim(),
                                timestamp: new Date().toISOString()
                            });
                            saveData();
                            chatInput.value = '';
                            loadChatMessages();
                        }
                    };
                    chatInput.onkeypress = (e) => { if (e.key === 'Enter') sendChatBtn.click(); };
                }
                
                if (closeChatModal) closeChatModal.onclick = () => {
                    chatModal.classList.add('hidden');
                    chatModal.classList.remove('flex');
                };
                if (chatModal) chatModal.onclick = (e) => { if (e.target === chatModal) chatModal.classList.add('hidden'); };
                
                // Server click
                document.querySelectorAll('.server-card').forEach(card => {
                    card.onclick = () => {
                        alert('🚀 Tính năng chat trong server đang phát triển!\n💬 Hiện tại bạn có thể chat riêng với bạn bè.');
                    };
                });
                
                // Profile view
                const editProfileBtn = document.getElementById('editProfileBtn');
                const editModal = document.getElementById('editModal');
                const closeEditModal = document.getElementById('closeEditModal');
                const saveProfileBtn = document.getElementById('saveProfileBtn');
                const backToFeed = document.getElementById('backToFeed');
                
                if (editProfileBtn && editModal) editProfileBtn.onclick = () => editModal.classList.remove('hidden');
                if (closeEditModal && editModal) closeEditModal.onclick = () => editModal.classList.add('hidden');
                if (saveProfileBtn) saveProfileBtn.onclick = updateProfile;
                if (backToFeed) backToFeed.onclick = () => { currentView = 'feed'; renderApp(); };
            }
        }
        
        // Khởi động
        loadData();
        renderApp();
    </script>
</body>
</html>
