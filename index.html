=<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌞 SOLAR SYSTEM 3D - Hệ Mặt Trời tương tác</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            z-index: 100;
            pointer-events: none;
            border-left: 4px solid #ffaa00;
            font-size: 14px;
        }
        
        #info h1 {
            margin: 0;
            font-size: 1.3rem;
            letter-spacing: 2px;
        }
        
        #info p {
            margin: 5px 0 0;
            font-size: 0.8rem;
            opacity: 0.8;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            z-index: 100;
        }
        
        button {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 14px;
            letter-spacing: 1px;
        }
        
        button:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border-color: #ffaa00;
        }
        
        .planet-label {
            position: absolute;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
            white-space: nowrap;
            pointer-events: none;
            font-weight: 500;
            border-left: 2px solid #ffaa00;
            z-index: 200;
        }
        
        #speed-control {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 10px 15px;
            border-radius: 30px;
            color: white;
            z-index: 100;
            font-size: 12px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        input {
            cursor: pointer;
            width: 120px;
        }
        
        #status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            color: #ffaa00;
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
            pointer-events: none;
        }
        
        @media (max-width: 600px) {
            button { padding: 5px 12px; font-size: 10px; }
            #info { padding: 8px 16px; }
            #info h1 { font-size: 1rem; }
            .planet-label { font-size: 8px; padding: 1px 4px; }
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>🌌 HỆ MẶT TRỜI 3D</h1>
        <p>🖱️ Kéo chuột xoay góc nhìn | 📜 Cuộn zoom | ✨ Mỗi hành tinh quay với tốc độ riêng</p>
    </div>
    <div id="status">
        🚀 Tốc độ thời gian: <span id="speedValue">1.0</span>x
    </div>
    <div id="controls">
        <button id="resetViewBtn">🎯 Reset góc nhìn</button>
        <button id="toggleOrbitBtn">🔄 Ẩn/Hiện quỹ đạo</button>
        <button id="toggleLabelsBtn">🏷️ Ẩn/Hiện nhãn</button>
        <button id="autoRotateBtn">🎬 Tự động xoay</button>
    </div>
    <div id="speed-control">
        <span>⏩ Tốc độ chuyển động:</span>
        <input type="range" id="speedSlider" min="0" max="3" step="0.01" value="1.0">
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- Khởi tạo scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010118);
        scene.fog = new THREE.FogExp2(0x010118, 0.0003);
        
        // --- Camera ---
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 20, 35);
        camera.lookAt(0, 0, 0);
        
        // --- Renderer ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);
        
        // --- Effect Composer (Bloom cho Mặt Trời) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.4, 0.85);
        bloomPass.threshold = 0.05;
        bloomPass.strength = 0.6;
        bloomPass.radius = 0.8;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.autoRotateSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.5;
        controls.rotateSpeed = 0.8;
        controls.target.set(0, 0, 0);
        
        // --- Ánh sáng nền và ambient ---
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);
        
        // ---- MẶT TRỜI (Trung tâm) ----
        const sunGeometry = new THREE.SphereGeometry(2.5, 128, 128);
        const sunMaterial = new THREE.MeshStandardMaterial({
            color: 0xffaa44,
            emissive: 0xff4400,
            emissiveIntensity: 1.5,
            metalness: 0.9,
            roughness: 0.3
        });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sun);
        
        // Thêm ánh sáng từ Mặt Trời
        const sunLight = new THREE.PointLight(0xffaa66, 2.5, 50);
        sunLight.position.set(0, 0, 0);
        scene.add(sunLight);
        
        // Thêm glow effect cho Mặt Trời
        const sunGlowGeometry = new THREE.SphereGeometry(2.65, 32, 32);
        const sunGlowMaterial = new THREE.MeshBasicMaterial({
            color: 0xff8844,
            transparent: true,
            opacity: 0.15,
            side: THREE.BackSide
        });
        const sunGlow = new THREE.Mesh(sunGlowGeometry, sunGlowMaterial);
        scene.add(sunGlow);
        
        // --- Dữ liệu các hành tinh ---
        // Tên, màu, kích thước, khoảng cách, tốc độ quay, tốc độ tự quay
        const planetsData = [
            { name: "Sao Thủy", color: 0xbc9a6c, size: 0.28, distance: 4.2, speed: 0.025, rotationSpeed: 0.004 },
            { name: "Sao Kim",   color: 0xe6b856, size: 0.32, distance: 5.5, speed: 0.018, rotationSpeed: 0.002 },
            { name: "Trái Đất",  color: 0x4c9eff, size: 0.35, distance: 6.8, speed: 0.015, rotationSpeed: 0.006 },
            { name: "Sao Hỏa",   color: 0xc4553c, size: 0.30, distance: 8.2, speed: 0.012, rotationSpeed: 0.005 },
            { name: "Sao Mộc",   color: 0xd8a27a, size: 0.75, distance: 11.5, speed: 0.007, rotationSpeed: 0.008 },
            { name: "Sao Thổ",   color: 0xf0d9b0, size: 0.68, distance: 13.8, speed: 0.0055, rotationSpeed: 0.007, hasRing: true },
            { name: "Sao Thiên Vương", color: 0xb0e0e6, size: 0.52, distance: 16.5, speed: 0.004, rotationSpeed: 0.005 },
            { name: "Sao Hải Vương", color: 0x4a6eff, size: 0.50, distance: 18.8, speed: 0.0032, rotationSpeed: 0.005 }
        ];
        
        const planets = [];
        const orbits = [];
        
        // Hàm tạo quỹ đạo (Elip nhưng gần tròn)
        function createOrbit(radius, color = 0x44aaff) {
            const points = [];
            const segments = 128;
            const angleStep = (Math.PI * 2) / segments;
            for (let i = 0; i <= segments; i++) {
                const angle = i * angleStep;
                const x = radius * Math.cos(angle);
                const z = radius * Math.sin(angle);
                points.push(new THREE.Vector3(x, 0, z));
            }
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.4 });
            const orbit = new THREE.LineLoop(geometry, material);
            scene.add(orbit);
            return orbit;
        }
        
        // Tạo quỹ đạo cho từng hành tinh
        planetsData.forEach(data => {
            const orbit = createOrbit(data.distance, 0x88aaff);
            orbits.push(orbit);
            
            // Tạo hành tinh
            const geometry = new THREE.SphereGeometry(data.size, 64, 64);
            const material = new THREE.MeshStandardMaterial({
                color: data.color,
                metalness: 0.3,
                roughness: 0.6,
                emissive: 0x000000
            });
            const planet = new THREE.Mesh(geometry, material);
            planet.userData = {
                name: data.name,
                distance: data.distance,
                speed: data.speed,
                rotationSpeed: data.rotationSpeed,
                angle: Math.random() * Math.PI * 2
            };
            scene.add(planet);
            
            // Thêm vành đai cho Sao Thổ
            if (data.hasRing) {
                const ringGeometry = new THREE.TorusGeometry(data.size * 1.3, 0.12, 32, 100);
                const ringMaterial = new THREE.MeshStandardMaterial({ color: 0xc2b280, metalness: 0.5, roughness: 0.4 });
                const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                ring.rotation.x = Math.PI / 2.2;
                planet.add(ring);
            }
            
            planets.push(planet);
        });
        
        // --- Thêm tiểu hành tinh (vành đai asteroid) ---
        const asteroidCount = 3000;
        const asteroidGeometry = new THREE.BufferGeometry();
        const asteroidPositions = new Float32Array(asteroidCount * 3);
        for (let i = 0; i < asteroidCount; i++) {
            const r = 10 + Math.random() * 2.5;
            const angle = Math.random() * Math.PI * 2;
            const y = (Math.random() - 0.5) * 1.5;
            asteroidPositions[i*3] = Math.cos(angle) * r;
            asteroidPositions[i*3+1] = y;
            asteroidPositions[i*3+2] = Math.sin(angle) * r;
        }
        asteroidGeometry.setAttribute('position', new THREE.BufferAttribute(asteroidPositions, 3));
        const asteroidMaterial = new THREE.PointsMaterial({ color: 0xaa9977, size: 0.05 });
        const asteroidField = new THREE.Points(asteroidGeometry, asteroidMaterial);
        scene.add(asteroidField);
        
        // --- Ngôi sao nền (stars) ---
        const starCount = 6000;
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 400;
            starPositions[i*3+1] = (Math.random() - 0.5) * 200;
            starPositions[i*3+2] = (Math.random() - 0.5) * 150 - 50;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.12, transparent: true, opacity: 0.7 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // Thêm sao nhấp nháy (sao lớn hơn 1 chút)
        const bigStarCount = 800;
        const bigStarGeometry = new THREE.BufferGeometry();
        const bigStarPositions = new Float32Array(bigStarCount * 3);
        const bigStarColors = new Float32Array(bigStarCount * 3);
        for (let i = 0; i < bigStarCount; i++) {
            bigStarPositions[i*3] = (Math.random() - 0.5) * 350;
            bigStarPositions[i*3+1] = (Math.random() - 0.5) * 180;
            bigStarPositions[i*3+2] = (Math.random() - 0.5) * 120 - 40;
            const colorVal = 0.7 + Math.random() * 0.5;
            bigStarColors[i*3] = colorVal;
            bigStarColors[i*3+1] = colorVal * (0.7 + Math.random() * 0.3);
            bigStarColors[i*3+2] = colorVal * (0.5 + Math.random() * 0.5);
        }
        bigStarGeometry.setAttribute('position', new THREE.BufferAttribute(bigStarPositions, 3));
        bigStarGeometry.setAttribute('color', new THREE.BufferAttribute(bigStarColors, 3));
        const bigStarMaterial = new THREE.PointsMaterial({ size: 0.2, vertexColors: true, transparent: true, opacity: 0.8 });
        const bigStars = new THREE.Points(bigStarGeometry, bigStarMaterial);
        scene.add(bigStars);
        
        // --- Tạo label HTML cho hành tinh ---
        const labels = [];
        function createLabel(planet, name) {
            const div = document.createElement('div');
            div.className = 'planet-label';
            div.textContent = name;
            document.body.appendChild(div);
            labels.push({ element: div, planet: planet });
        }
        
        planets.forEach(planet => {
            createLabel(planet, planet.userData.name);
        });
        
        // --- Biến điều khiển ---
        let showOrbits = true;
        let showLabels = true;
        let timeSpeed = 1.0;
        let time = 0;
        
        // --- Events ---
        document.getElementById('resetViewBtn').addEventListener('click', () => {
            camera.position.set(0, 15, 30);
            controls.target.set(0, 0, 0);
            controls.update();
        });
        
        document.getElementById('toggleOrbitBtn').addEventListener('click', () => {
            showOrbits = !showOrbits;
            orbits.forEach(orbit => {
                orbit.visible = showOrbits;
            });
            document.getElementById('toggleOrbitBtn').style.borderColor = showOrbits ? '#ffaa00' : 'rgba(255,255,255,0.3)';
        });
        
        document.getElementById('toggleLabelsBtn').addEventListener('click', () => {
            showLabels = !showLabels;
            labels.forEach(label => {
                label.element.style.display = showLabels ? 'block' : 'none';
            });
            document.getElementById('toggleLabelsBtn').style.borderColor = showLabels ? '#ffaa00' : 'rgba(255,255,255,0.3)';
        });
        
        document.getElementById('autoRotateBtn').addEventListener('click', () => {
            controls.autoRotate = !controls.autoRotate;
            document.getElementById('autoRotateBtn').style.borderColor = controls.autoRotate ? '#ffaa00' : 'rgba(255,255,255,0.3)';
        });
        
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        speedSlider.addEventListener('input', (e) => {
            timeSpeed = parseFloat(e.target.value);
            speedValue.innerText = timeSpeed.toFixed(2);
        });
        
        // --- Cập nhật vị trí label (2D projection) ---
        function updateLabels() {
            if (!showLabels) return;
            labels.forEach(label => {
                const vector = label.planet.position.clone();
                vector.project(camera);
                const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                const y = (-vector.y * 0.5 + 0.5) * window.innerHeight;
                label.element.style.left = `${x - 30}px`;
                label.element.style.top = `${y - 25}px`;
                // Ẩn label nếu ở sau camera
                if (vector.z > 1) {
                    label.element.style.opacity = '0';
                } else {
                    label.element.style.opacity = '1';
                }
            });
        }
        
        // --- Animation chính ---
        let lastTime = performance.now();
        
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            // Cập nhật thời gian với tốc độ
            time += delta * timeSpeed;
            
            // Di chuyển các hành tinh
            planets.forEach(planet => {
                const data = planet.userData;
                data.angle += data.speed * delta * timeSpeed;
                if (data.angle > Math.PI * 2) data.angle -= Math.PI * 2;
                
                const x = Math.cos(data.angle) * data.distance;
                const z = Math.sin(data.angle) * data.distance;
                planet.position.set(x, 0, z);
                
                // Tự quay quanh trục
                planet.rotation.y += data.rotationSpeed * delta * timeSpeed;
            });
            
            // Xoay vành đại tiểu hành tinh
            asteroidField.rotation.y += 0.002 * timeSpeed;
            
            // Xoay các ngôi sao nhẹ
            stars.rotation.y += 0.0002;
            bigStars.rotation.x += 0.0001;
            
            // Hiệu ứng Mặt Trời nhấp nháy
            const intensity = 2.2 + Math.sin(Date.now() * 0.003) * 0.3;
            sunLight.intensity = intensity;
            sunMaterial.emissiveIntensity = 1.3 + Math.sin(Date.now() * 0.004) * 0.2;
            sunGlow.material.opacity = 0.12 + Math.sin(Date.now() * 0.002) * 0.05;
            
            // Cập nhật controls và label
            controls.update();
            updateLabels();
            
            // Render với EffectComposer
            effectComposer.render();
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // --- Xử lý resize window ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
            updateLabels();
        }
        
        // Khởi tạo vị trí ban đầu
        planets.forEach((planet, idx) => {
            const data = planet.userData;
            data.angle = (idx / planets.length) * Math.PI * 2;
            planet.position.x = Math.cos(data.angle) * data.distance;
            planet.position.z = Math.sin(data.angle) * data.distance;
        });
        
        console.log('%c🌞 SOLAR SYSTEM 3D LOADED | Khám phá vũ trụ nào! 🚀', 'color: #ffaa00; font-size: 16px; font-weight: bold;');
    </script>
</body>
</html>
