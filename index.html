<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Trần Minh Tuấn 2k12 | Studio Lyric Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, #0a0f2a, #020617);
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Container chính */
        .app-container {
            width: 100%;
            max-width: 700px;
            transition: all 0.3s ease;
        }

        /* KHUNG NHẬP LIỆU (trạng thái ban đầu) */
        .input-panel {
            background: rgba(10, 20, 35, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 2rem 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
            transition: all 0.4s;
        }

        .title-glow {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FF85C2, #A569FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .sub {
            color: #aaaaff;
            font-size: 0.85rem;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 180, 200, 0.5);
            border-radius: 32px;
            padding: 18px 20px;
            font-size: 1rem;
            font-family: 'Poppins', monospace;
            color: #ffecb3;
            resize: vertical;
            outline: none;
            transition: 0.2s;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        textarea:focus {
            border-color: #ff66cc;
            box-shadow: 0 0 15px #ff66aa;
        }

        .btn-run {
            background: linear-gradient(95deg, #ff3d8c, #b73c9e);
            border: none;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            margin-top: 24px;
            cursor: pointer;
            width: 80%;
            transition: 0.2s;
            box-shadow: 0 6px 18px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }

        .btn-run:hover {
            transform: scale(1.02);
            background: linear-gradient(95deg, #ff5fa0, #d44bb3);
            box-shadow: 0 0 18px #ff66aa;
        }

        /* KHUNG HIỆN THỊ ANIMATION (ẩn ban đầu) */
        .animation-panel {
            display: none;
            background: rgba(5, 8, 20, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 1.8rem;
            border: 1px solid rgba(255, 215, 150, 0.5);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            text-align: center;
            animation: fadeInUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .artist-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .song-badge {
            font-size: 1.2rem;
            font-weight: 600;
            background: rgba(0,0,0,0.5);
            padding: 6px 18px;
            border-radius: 40px;
            color: #ffdd99;
            border-left: 4px solid #ff77aa;
        }

        .btn-back {
            background: rgba(255,255,240,0.15);
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: 0.2s;
        }

        .btn-back:hover {
            background: rgba(255,100,150,0.4);
        }

        /* Khung chứa lời nhạc animation */
        .lyric-stage {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 48px;
            min-height: 380px;
            padding: 32px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            border: 1px solid rgba(255, 200, 150, 0.3);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .animated-lyric {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            line-height: 1.4;
            transition: all 0.4s ease;
            color: #fff0cc;
            text-shadow: 0 0 5px #ff66aa, 0 0 12px #ff44aa;
            word-break: break-word;
            animation: lyricPulse 1.6s infinite alternate;
            background: linear-gradient(135deg, #ffe6b3, #ffb3e6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: none;
        }

        @keyframes lyricPulse {
            0% {
                letter-spacing: 1px;
                filter: drop-shadow(0 0 2px #ff88cc);
                transform: scale(1);
            }
            100% {
                letter-spacing: 4px;
                filter: drop-shadow(0 0 12px #ff44ee);
                transform: scale(1.02);
            }
        }

        /* Hiệu ứng nền động nhẹ */
        .moving-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .orb {
            position: absolute;
            width: 40vmax;
            height: 40vmax;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,100,200,0.2), transparent);
            animation: floatBg 18s infinite alternate;
            filter: blur(70px);
        }
        .orb2 {
            background: radial-gradient(circle, rgba(100,200,255,0.2), transparent);
            bottom: 0;
            right: 0;
            animation: floatBg2 22s infinite alternate;
        }
        @keyframes floatBg {
            0% { transform: translate(0,0) scale(1); opacity: 0.4; }
            100% { transform: translate(8%, 10%) scale(1.3); opacity: 0.8; }
        }
        @keyframes floatBg2 {
            0% { transform: translate(0,0) scale(0.9); opacity: 0.3; }
            100% { transform: translate(-12%, -8%) scale(1.4); opacity: 0.7; }
        }

        /* Nút điều khiển animation */
        .animation-controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 16px 0 8px;
        }
        .anim-btn {
            background: rgba(255,255,240,0.15);
            border: none;
            padding: 10px 22px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .anim-btn-primary {
            background: linear-gradient(145deg, #ff4d9e, #bb2e7a);
            box-shadow: 0 0 6px #ff77bb;
        }
        .footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            color: #aaaaf0;
        }

        @media (max-width: 550px) {
            .animated-lyric { font-size: 1.4rem; }
            .title-glow { font-size: 1.3rem; }
            .input-panel { padding: 1.5rem; }
            .btn-run { width: 100%; }
        }
    </style>
</head>
<body>

<div class="moving-bg">
    <div class="orb"></div>
    <div class="orb orb2"></div>
</div>

<div class="app-container">
    <!-- ========== PHẦN NHẬP LỜI NHẠC ========= -->
    <div id="inputSection" class="input-panel">
        <div class="title-glow">✨ Trần Minh Tuấn 2k12 ✨</div>
        <div class="sub">📝 Nhập lời bài hát "Không Buông" (hoặc lời bạn muốn) bên dưới</div>
        <textarea id="lyricInput" rows="5" placeholder="Ví dụ:&#10;Không buông tay anh nhé&#10;Dù cho mai sau cách xa&#10;Vẫn luôn yêu em mà..."></textarea>
        <div>
            <button class="btn-run" id="runBtn">🎆 CHẠY HIỆU ỨNG 🎆</button>
        </div>
        <div class="footer" style="margin-top: 18px;">💡 Nhập mỗi câu trên một dòng → Bấm chạy để xem animation chữ đẹp mắt</div>
    </div>

    <!-- ========== PHẦN HIỂN THỊ ANIMATION (ban đầu ẩn) ========= -->
    <div id="animationSection" class="animation-panel">
        <div class="artist-header">
            <span class="song-badge">🎤 Không Buông - Hngle 🎤</span>
            <button id="backBtn" class="btn-back">✍️ Nhập lời mới</button>
        </div>
        <div class="lyric-stage" id="lyricStage">
            <div id="displayLyric" class="animated-lyric">✨ Chờ đợi hiệu ứng... ✨</div>
        </div>
        <div class="animation-controls">
            <button id="prevLineBtn" class="anim-btn">⏮️ Câu trước</button>
            <button id="playAutoBtn" class="anim-btn anim-btn-primary">▶️ TỰ ĐỘNG</button>
            <button id="nextLineBtn" class="anim-btn">Câu tiếp ⏭️</button>
        </div>
        <div class="footer">
            🎵 Animation chữ lung linh | Tự động chuyển câu sau 3.5 giây | Bấm nút để tương tác
        </div>
    </div>
</div>

<script>
    (function() {
        // DOM elements
        const inputSection = document.getElementById('inputSection');
        const animationSection = document.getElementById('animationSection');
        const runBtn = document.getElementById('runBtn');
        const backBtn = document.getElementById('backBtn');
        const lyricInput = document.getElementById('lyricInput');
        const displayLyricDiv = document.getElementById('displayLyric');
        const prevLineBtn = document.getElementById('prevLineBtn');
        const nextLineBtn = document.getElementById('nextLineBtn');
        const playAutoBtn = document.getElementById('playAutoBtn');

        // Dữ liệu lời bài hát được phân tích từ input
        let lyricsArray = [];        // mảng các dòng lời
        let currentIndex = 0;
        let autoInterval = null;
        let isAutoPlaying = false;

        // Hàm xử lý animation chuyển câu với hiệu ứng đẹp mắt
        function updateLyricDisplay() {
            if (!lyricsArray.length) {
                displayLyricDiv.innerText = "💖 Không có lời nào, hãy quay lại nhập lời! 💖";
                return;
            }
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= lyricsArray.length) currentIndex = lyricsArray.length - 1;
            const newText = lyricsArray[currentIndex];
            // reset animation để tạo hiệu ứng mượt
            displayLyricDiv.style.animation = 'none';
            displayLyricDiv.offsetHeight; // force reflow
            displayLyricDiv.innerText = newText;
            displayLyricDiv.style.animation = 'lyricPulse 1.6s infinite alternate';
            // thêm hiệu ứng glow tạm thời
            displayLyricDiv.style.transform = 'scale(1.02)';
            setTimeout(() => {
                if (displayLyricDiv) displayLyricDiv.style.transform = '';
            }, 200);
        }

        // Dừng auto play nếu đang chạy
        function stopAutoPlay() {
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
            }
            isAutoPlaying = false;
            if (playAutoBtn) playAutoBtn.innerHTML = '▶️ TỰ ĐỘNG';
        }

        // Bắt đầu auto play (chạy lần lượt các câu)
        function startAutoPlay() {
            if (!lyricsArray.length) return;
            stopAutoPlay();
            isAutoPlaying = true;
            playAutoBtn.innerHTML = '⏸️ DỪNG';
            autoInterval = setInterval(() => {
                if (currentIndex + 1 < lyricsArray.length) {
                    currentIndex++;
                    updateLyricDisplay();
                } else {
                    // nếu hết lời, quay lại câu đầu (hoặc dừng - tùy chọn: quay lại để trải nghiệm)
                    currentIndex = 0;
                    updateLyricDisplay();
                    // tạo hiệu ứng phấn khích
                    addTemporaryGlow();
                }
            }, 3500); // mỗi 3.5s chuyển câu
        }

        // hiệu ứng phụ
        function addTemporaryGlow() {
            const stage = document.getElementById('lyricStage');
            if (stage) {
                stage.style.transition = '0.2s';
                stage.style.boxShadow = '0 0 20px #ff66aa, inset 0 0 15px rgba(255,100,200,0.3)';
                setTimeout(() => {
                    if (stage) stage.style.boxShadow = '';
                }, 400);
            }
        }

        // Chuyển sang chế độ animation dựa trên nội dung nhập
        function switchToAnimation() {
            // Lấy nội dung từ textarea, tách dòng
            let rawText = lyricInput.value;
            // tách các dòng, bỏ dòng trống đầu cuối
            let lines = rawText.split(/\r?\n/);
            // Lọc bỏ dòng chỉ toàn khoảng trắng
            lines = lines.filter(line => line.trim().length > 0);
            
            if (lines.length === 0) {
                // Nếu không nhập gì, dùng lời mẫu gợi ý từ bài "Không Buông"
                lines = [
                    "🌙 Không buông tay em nhé",
                    "💖 Dù mai đây cách xa",
                    "🎵 Vẫn luôn yêu thương này",
                    "✨ Chẳng thể phai nhòa",
                    "🔥 Không Buông - Hngle 🔥",
                    "💫 Trần Minh Tuấn 2k12 lắng nghe!"
                ];
                lyricInput.value = lines.join('\n');
            }
            
            lyricsArray = [...lines];
            currentIndex = 0;
            
            // Dừng auto nếu đang chạy trước đó
            stopAutoPlay();
            
            // Ẩn input panel, hiển thị animation panel
            inputSection.style.display = 'none';
            animationSection.style.display = 'block';
            
            // Hiển thị câu đầu tiên
            updateLyricDisplay();
            
            // Tự động chạy auto play để sinh động liền
            startAutoPlay();
            
            // Thêm hiệu ứng mừng rỡ khi chuyển
            const stage = document.getElementById('lyricStage');
            if (stage) {
                stage.style.transform = 'scale(0.98)';
                setTimeout(() => { if(stage) stage.style.transform = ''; }, 200);
            }
        }
        
        // Quay lại màn hình nhập lời (giữ nguyên nội dung đã nhập)
        function backToInput() {
            stopAutoPlay();
            inputSection.style.display = 'block';
            animationSection.style.display = 'none';
            // reset hiển thị
            displayLyricDiv.innerText = "✨ Sẵn sàng cho lời nhạc mới ✨";
            lyricsArray = [];
            currentIndex = 0;
        }
        
        // Sự kiện nút điều khiển trong animation
        function nextLine() {
            if (!lyricsArray.length) return;
            stopAutoPlay();
            if (currentIndex + 1 < lyricsArray.length) {
                currentIndex++;
                updateLyricDisplay();
            } else {
                // vòng lại đầu danh sách
                currentIndex = 0;
                updateLyricDisplay();
                addTemporaryGlow();
            }
        }
        
        function prevLine() {
            if (!lyricsArray.length) return;
            stopAutoPlay();
            if (currentIndex - 1 >= 0) {
                currentIndex--;
                updateLyricDisplay();
            } else {
                // lên dòng cuối nếu muốn hoặc giữ nguyên
                currentIndex = lyricsArray.length - 1;
                updateLyricDisplay();
                addTemporaryGlow();
            }
        }
        
        function toggleAutoPlay() {
            if (!lyricsArray.length) return;
            if (isAutoPlaying) {
                stopAutoPlay();
            } else {
                startAutoPlay();
            }
        }
        
        // Gán sự kiện các nút
        runBtn.addEventListener('click', switchToAnimation);
        backBtn.addEventListener('click', backToInput);
        nextLineBtn.addEventListener('click', nextLine);
        prevLineBtn.addEventListener('click', prevLine);
        playAutoBtn.addEventListener('click', toggleAutoPlay);
        
        // Nếu người dùng nhấn phím tắt hoặc muốn trải nghiệm thêm: nhập mẫu sẵn "Không Buông" (gợi ý)
        // Thiết lập mẫu lời đẹp cho bài Hngle
        const defaultLyric = `Không buông đôi tay này
Dù giông tố phủ vây
Chỉ cần em ở đây
Là bình yên chốn này

Hngle ơi, không buông
Giữ mãi trong tim
Tình yêu như ánh sáng
Xua tan màn đêm đen`;
        
        lyricInput.value = defaultLyric;
        
        // thêm hiệu ứng nhấn nút gợi cảm giác
        const allBtns = document.querySelectorAll('button');
        allBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                btn.style.transform = 'scale(0.96)';
                setTimeout(() => { btn.style.transform = ''; }, 120);
            });
        });
        
        // tự động focus vào text nếu cần
        lyricInput.focus();
        
        // đảm bảo khi quay lại từ animation, có thể tiếp tục nhập lời mới
        window.addEventListener('load', () => {
            // kiểm tra nếu có sẵn lời nhạc hay chưa
            console.log("Ready - Trần Minh Tuấn 2k12 - Animation lời nhạc siêu cấp");
        });
        
        // thêm hiệu ứng nền động nhẹ di chuyển theo chuột (optional siêu nhẹ)
        document.body.addEventListener('mousemove', (e) => {
            const orbs = document.querySelectorAll('.orb');
            if (orbs.length) {
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                orbs[0].style.transform = `translate(${x * 15}px, ${y * 10}px)`;
                if(orbs[1]) orbs[1].style.transform = `translate(${-x * 12}px, ${-y * 8}px)`;
            }
        });
    })();
</script>
</body>
</html>
