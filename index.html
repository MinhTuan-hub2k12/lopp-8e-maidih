<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Trần Minh Tuấn 2k12 | Visualizer đẹp & Nhạc Không Buông</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #03050b);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', 'Segoe UI', system-ui, -apple-system, 'Montserrat', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* hiệu ứng nền động (hạt sao & khói màu) */
        .bg-effect {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05) 1px, transparent 2px);
            background-size: 40px 40px;
            animation: starMove 40s linear infinite;
            opacity: 0.6;
        }

        @keyframes starMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 100px); }
        }

        .glow-orb {
            position: absolute;
            width: 50vmax;
            height: 50vmax;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.15), rgba(255, 0, 255, 0));
            border-radius: 50%;
            top: -20%;
            left: -20%;
            filter: blur(80px);
            animation: floatGlow 12s infinite alternate ease-in-out;
        }

        .glow-orb2 {
            bottom: -20%;
            right: -20%;
            top: auto;
            left: auto;
            background: radial-gradient(circle, rgba(255, 100, 200, 0.2), rgba(0, 200, 255, 0));
            animation: floatGlow2 15s infinite alternate;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(10%, 10%) scale(1.3); opacity: 0.8; }
        }
        @keyframes floatGlow2 {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: translate(-8%, -12%) scale(1.4); opacity: 0.7; }
        }

        /* Card chính */
        .music-card {
            position: relative;
            z-index: 10;
            background: rgba(10, 20, 35, 0.55);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 1.8rem 2rem;
            width: 90%;
            max-width: 550px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Header tên + hiệu ứng */
        .name-glow {
            text-align: center;
            margin-bottom: 1rem;
        }

        .main-name {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD166, #FF6AC2, #6C5CE7);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 3s linear infinite, textGlow 1.8s ease-in-out infinite alternate;
            letter-spacing: 2px;
            text-shadow: 0 0 12px rgba(255,105,180,0.5);
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        @keyframes textGlow {
            0% { text-shadow: 0 0 2px #fff, 0 0 5px #ff66cc; }
            100% { text-shadow: 0 0 12px #ff44aa, 0 0 20px #a55eff; }
        }

        .badge {
            display: inline-block;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border-radius: 100px;
            padding: 6px 20px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #ffeecc;
            margin-top: 6px;
            letter-spacing: 1px;
            border: 1px solid rgba(255,215,0,0.4);
        }

        /* visualizer canvas */
        .visualizer-container {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 40px;
            margin: 20px 0;
            padding: 12px;
            backdrop-filter: blur(4px);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3), 0 8px 20px rgba(0,0,0,0.2);
        }

        canvas {
            width: 100%;
            display: block;
            border-radius: 32px;
            background: #01041a;
            box-shadow: 0 0 20px rgba(0,255,255,0.2);
            transition: all 0.2s;
        }

        /* controls */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin: 20px 0 15px;
        }

        .ctrl-btn {
            background: rgba(255,255,240,0.1);
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 60px;
            font-size: 28px;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: 0.2s;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover {
            transform: scale(1.07);
            background: rgba(255,200,200,0.3);
            box-shadow: 0 0 15px #ff99ff;
        }

        .play-pause {
            background: linear-gradient(145deg, #ff4da6, #c53a8a);
            box-shadow: 0 0 15px #ff66aa;
            width: 70px;
            height: 70px;
            font-size: 36px;
        }

        .song-info {
            text-align: center;
            margin-top: 12px;
            font-weight: 500;
            background: rgba(0,0,0,0.4);
            padding: 8px 12px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            font-size: 0.9rem;
        }

        .song-title {
            color: #ffe3b3;
            letter-spacing: 1px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .wave-icon {
            display: inline-block;
            animation: pulseWave 1s infinite;
        }

        @keyframes pulseWave {
            0% { opacity: 0.4; text-shadow: 0 0 0px; }
            100% { opacity: 1; text-shadow: 0 0 8px cyan; }
        }

        .volume-slider {
            width: 120px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 60px;
        }

        input[type="range"] {
            width: 100%;
            background: #ff99cc;
            height: 4px;
            border-radius: 10px;
            -webkit-appearance: none;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ff66cc;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 6px white;
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 20px;
            color: #bbaaee;
        }

        @media (max-width: 550px) {
            .music-card { padding: 1.2rem; }
            .main-name { font-size: 1.6rem; }
            .ctrl-btn { width: 48px; height: 48px; font-size: 24px; }
            .play-pause { width: 60px; height: 60px; font-size: 32px; }
        }
    </style>
</head>
<body>
<div class="bg-effect">
    <div class="stars"></div>
    <div class="glow-orb"></div>
    <div class="glow-orb glow-orb2"></div>
</div>

<div class="music-card">
    <div class="name-glow">
        <div class="main-name">✨ Trần Minh Tuấn 2k12 ✨</div>
        <div class="badge">⚡ ENERGY X VISUALIZER ⚡</div>
    </div>

    <div class="visualizer-container">
        <canvas id="visualizerCanvas" width="800" height="280" style="width:100%; height:auto; aspect-ratio:800/280"></canvas>
    </div>

    <div class="controls">
        <button class="ctrl-btn" id="prevBtn" title="Bài trước">⏮️</button>
        <button class="ctrl-btn play-pause" id="playPauseBtn">▶️</button>
        <button class="ctrl-btn" id="nextBtn" title="Bài tiếp">⏭️</button>
    </div>

    <div class="song-info">
        <div class="song-title">
            <span class="wave-icon">🎵</span> 
            <span id="songNameDisplay">Không Buông - Tình ca 2k12</span>
            <span class="wave-icon">🎧</span>
        </div>
        <div class="volume-slider">
            <span>🔊</span>
            <input type="range" id="volumeControl" min="0" max="1" step="0.01" value="0.7">
        </div>
    </div>
    <div class="footer-note">
        ✨ Hiệu ứng nhạc lung linh | Dành riêng cho Tuấn 2k12 ✨
    </div>
</div>

<script>
    (function(){
        // -------- danh sách nhạc (các bài “Không Buông” những giai điệu sôi động, lo-fi và vibe) 
        // Sử dụng các nguồn audio từ bộ sưu tập online cho phép nhúng miễn phí (demo sử dụng file mẫu từ các nguồn creative commons)
        // Nhưng để trải nghiệm tốt, tôi dùng các bài nhạc không bản quyền phong cách "Không Buông" - tạo cảm giác trẻ trung
        // Lưu ý: Đường dẫn sử dụng các file âm thanh từ server hỗ trợ CORS, nhưng để chắc chắn auto-play, dùng audio context cần user tương tác.
        // Tuy nhiên chúng ta có thể dùng thủ thuật: nhấn play lần đầu sẽ kích hoạt tất cả. Auto-play bị hạn chế nhưng có nút bấm.
        // Bài hát mô phỏng tựa đề "Không Buông" (remix)
        
        const playlist = [
            { name: "🎧 Không Buông (Remix 2k12) 🎧", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
            { name: "💥 Không Buông - Tuấn 2k12 Tập 2 💥", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
            { name: "✨ Không Buông (EDM Ver) ✨", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
        ];
        
        let currentTrack = 0;
        let audio = new Audio();
        audio.crossOrigin = "Anonymous"; // để phân tích dữ liệu tần số
        let audioContext = null;
        let analyser = null;
        let sourceNode = null;
        let isAudioContextReady = false;
        let animationId = null;
        let canvas = document.getElementById('visualizerCanvas');
        let ctx = canvas.getContext('2d');
        
        // DOM elements
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const songNameDisplay = document.getElementById('songNameDisplay');
        const volumeSlider = document.getElementById('volumeControl');
        
        // Cập nhật tên bài
        function updateSongInfo() {
            songNameDisplay.innerText = playlist[currentTrack].name;
        }
        
        // Setup AudioContext và Analyser
        function setupAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                analyser.connect(audioContext.destination);
            }
            if (sourceNode) {
                try {
                    sourceNode.disconnect();
                } catch(e) {}
            }
            sourceNode = audioContext.createMediaElementSource(audio);
            sourceNode.connect(analyser);
            analyser.connect(audioContext.destination);
            isAudioContextReady = true;
        }
        
        // Hàm tải và phát nhạc
        function loadTrack(index) {
            const track = playlist[index];
            audio.pause();
            audio.src = track.url;
            audio.load();
            audio.volume = volumeSlider.value;
            updateSongInfo();
            // Nếu audio context đã được setup và resume, cố gắng phát
            if (audioContext && audioContext.state === 'running') {
                audio.play().catch(e => console.log("autoplay blocked, click play"));
            }
            // reset visualizer buffer sẽ đẹp
        }
        
        // Phát nhạc & resume audio context
        async function playMusic() {
            if (!audioContext) {
                setupAudioContext();
            }
            if (audioContext && audioContext.state === 'suspended') {
                await audioContext.resume();
            }
            if (!isAudioContextReady && audioContext) {
                setupAudioContext();
                await audioContext.resume();
            }
            await audio.play().catch(err => {
                console.warn("Playback error:", err);
                // thử fallback: do trình duyệt chặn, nhưng có thể người dùng click
            });
            playPauseBtn.innerHTML = '⏸️';
        }
        
        function pauseMusic() {
            audio.pause();
            playPauseBtn.innerHTML = '▶️';
        }
        
        function togglePlayPause() {
            if (audio.paused) {
                playMusic();
            } else {
                pauseMusic();
            }
        }
        
        function nextTrack() {
            currentTrack = (currentTrack + 1) % playlist.length;
            loadTrack(currentTrack);
            if (!audio.paused) {
                playMusic();
            } else {
                // nếu đang dừng, chỉ load xong chờ play
                updateSongInfo();
            }
        }
        
        function prevTrack() {
            currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
            loadTrack(currentTrack);
            if (!audio.paused) {
                playMusic();
            } else {
                updateSongInfo();
            }
        }
        
        // Volume
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = parseFloat(e.target.value);
        });
        
        // Sự kiện nút
        playPauseBtn.addEventListener('click', togglePlayPause);
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);
        
        audio.addEventListener('ended', () => {
            nextTrack();
        });
        
        audio.addEventListener('play', () => {
            playPauseBtn.innerHTML = '⏸️';
        });
        
        audio.addEventListener('pause', () => {
            playPauseBtn.innerHTML = '▶️';
        });
        
        // Khởi tạo track đầu tiên
        loadTrack(0);
        
        // visualizer logic với hiệu ứng đẹp, nhạc không buông vibe
        let dataArray = new Uint8Array(0);
        function resizeCanvas() {
            const container = canvas.parentElement;
            const containerWidth = container.clientWidth;
            canvas.width = Math.min(containerWidth * 0.95, 800);
            canvas.height = 280;
            const w = canvas.width;
            const h = canvas.height;
            canvas.style.width = `${w}px`;
            canvas.style.height = `${h}px`;
        }
        window.addEventListener('resize', () => resizeCanvas());
        
        function initVisualizer() {
            if (!analyser) {
                requestAnimationFrame(drawWaiting);
                return;
            }
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            drawVisualizer();
        }
        
        function drawVisualizer() {
            if (!analyser || !canvas || !ctx) {
                requestAnimationFrame(drawWaiting);
                return;
            }
            analyser.getByteFrequencyData(dataArray);
            const width = canvas.width;
            const height = canvas.height;
            if (width === 0) return;
            
            ctx.clearRect(0, 0, width, height);
            
            // gradient nền tuyệt đẹp
            const gradientBg = ctx.createLinearGradient(0, 0, width, height);
            gradientBg.addColorStop(0, '#020617');
            gradientBg.addColorStop(1, '#0a1128');
            ctx.fillStyle = gradientBg;
            ctx.fillRect(0, 0, width, height);
            
            // Hiệu ứng ánh sáng bokeh
            ctx.shadowBlur = 0;
            const barCount = dataArray.length;
            const barWidth = width / barCount * 1.2;
            let x = 0;
            
            // giá trị trung bình để tạo màu động
            let avg = 0;
            for (let i = 0; i < barCount; i++) avg += dataArray[i];
            avg /= barCount;
            const intensity = Math.min(1, avg / 180);
            
            for (let i = 0; i < barCount; i++) {
                const value = dataArray[i];
                const percent = value / 255;
                // chiều cao cột (đẹp hơn với phóng đại)
                let barHeight = percent * height * 0.8;
                if (barHeight < 2) barHeight = 2;
                
                // màu sắc gradient theo tần số và cường độ
                const hue = (i * 0.8 + Date.now() * 0.01) % 360;
                const sat = 70 + intensity * 30;
                let lightness = 55 + percent * 35;
                let color = `hsl(${hue}, ${sat}%, ${lightness}%)`;
                
                // tạo hiệu ứng glowing
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsl(${hue}, 80%, 65%)`;
                ctx.fillStyle = color;
                const rectX = x;
                const rectY = height - barHeight;
                ctx.fillRect(rectX, rectY, barWidth - 0.8, barHeight);
                
                // thêm hạt phát sáng trên đỉnh cột
                ctx.fillStyle = `rgba(255, 240, 200, ${percent * 0.8})`;
                ctx.beginPath();
                ctx.arc(rectX + (barWidth - 0.8)/2, rectY - 2, 3 * percent + 1, 0, Math.PI*2);
                ctx.fill();
                
                x += barWidth;
            }
            ctx.shadowBlur = 0;
            
            // thêm lớp sóng lấp lánh (đường cong phản chiếu)
            ctx.beginPath();
            ctx.strokeStyle = `rgba(255, 180, 255, 0.4)`;
            ctx.lineWidth = 2;
            for (let i = 0; i < barCount; i+=3) {
                const value = dataArray[i];
                const yPos = height - (value/255) * height * 0.5;
                if(i===0) ctx.moveTo(i*barWidth, yPos);
                else ctx.lineTo(i*barWidth, yPos);
            }
            ctx.stroke();
            
            // thêm hiệu ứng particle xung quanh
            if (avg > 80) {
                ctx.fillStyle = `rgba(255, 100, 200, 0.3)`;
                for (let s=0; s<12; s++) {
                    ctx.beginPath();
                    ctx.arc(Math.random()*width, Math.random()*height, Math.random()*5+2, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            
            // dòng chữ "KHÔNG BUÔNG" nhấp nháy theo nhịp
            ctx.font = `bold ${Math.floor(18 + intensity * 12)}px "Poppins"`;
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#ff44ee";
            ctx.fillStyle = `rgba(255, 220, 150, ${0.5+intensity*0.5})`;
            ctx.textAlign = "center";
            ctx.fillText("✨ KHÔNG BUÔNG ✨", width/2, height - 12);
            ctx.textAlign = "left";
            ctx.shadowBlur = 0;
            
            requestAnimationFrame(drawVisualizer);
        }
        
        function drawWaiting() {
            if (!canvas) return;
            const width = canvas.width;
            const height = canvas.height;
            if(width === 0) {
                resizeCanvas();
            }
            ctx.fillStyle = '#01041a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 18px "Poppins"';
            ctx.fillStyle = '#88aaff';
            ctx.textAlign = "center";
            ctx.fillText("🎤 Chạm play để bùng nổ giai điệu 🎤", canvas.width/2, canvas.height/2);
            ctx.textAlign = "left";
            requestAnimationFrame(drawWaiting);
        }
        
        // khởi tạo canvas
        resizeCanvas();
        
        // Cập nhật analyser khi audio context sẵn sàng
        audio.addEventListener('canplaythrough', () => {
            if (!audioContext) {
                setupAudioContext();
            }
            if (analyser) {
                if (dataArray.length === 0) {
                    const bufferLength = analyser.frequencyBinCount;
                    dataArray = new Uint8Array(bufferLength);
                }
                initVisualizer();
            } else {
                setTimeout(() => {
                    if(!analyser && audioContext) setupAudioContext();
                    initVisualizer();
                }, 100);
            }
        });
        
        // thêm fallback khi người dùng tương tác, kích hoạt ctx và phân tích
        document.body.addEventListener('click', function initAudioOnFirstClick() {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume().then(() => {
                    if(audio.paused === false) {
                        // đang play ok
                    } else {
                        // có thể chủ động không auto play, để người dùng bấm nút
                    }
                });
            }
            if (!analyser && audioContext) {
                setupAudioContext();
                initVisualizer();
            }
        }, { once: false });
        
        // lắng nghe audio playing -> chắc chắn visualizer chạy
        audio.addEventListener('play', () => {
            if (!analyser && audioContext) {
                setupAudioContext();
                initVisualizer();
            } else if (analyser && dataArray.length===0){
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                drawVisualizer();
            } else if (!animationId && analyser){
                drawVisualizer();
            }
        });
        
        // khởi tạo visualizer mặc định (chờ)
        drawWaiting();
        
        // Thêm hiệu ứng khi hover, thay đổi màu
        setInterval(() => {
            if (analyser && !audio.paused) {
                // chỉ để tạo hiệu ứng màu sắc giao động
            }
        }, 50);
        
        // load lại track nếu fail url => next
        audio.addEventListener('error', () => {
            console.log("lỗi tải nhạc, chuyển bài");
            nextTrack();
        });
        
        // khởi tạo volume
        audio.volume = volumeSlider.value;
        
        // kích hoạt tên hiệu ứng name + animate
        const nameDiv = document.querySelector('.main-name');
        if(nameDiv) {
            setInterval(() => {
                if(!audio.paused) {
                    nameDiv.style.animation = 'none';
                    setTimeout(() => { nameDiv.style.animation = 'shimmer 3s linear infinite, textGlow 1.8s ease-in-out infinite alternate'; }, 10);
                }
            }, 2000);
        }
    })();
</script>
</body>
</html>
