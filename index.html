<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp 8E - Discord Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-attachment: fixed;
        }
        
        .glass {
            background: rgba(30, 27, 58, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .glass-card {
            background: rgba(20, 18, 40, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
        
        .glass-card:hover {
            border-color: rgba(88, 101, 242, 0.5);
            box-shadow: 0 8px 32px rgba(88, 101, 242, 0.1);
        }
        
        .sidebar-modern {
            background: rgba(15, 13, 30, 0.95);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .channel-item {
            transition: all 0.2s ease;
            border-radius: 8px;
        }
        
        .channel-item:hover {
            background: rgba(88, 101, 242, 0.2);
            transform: translateX(2px);
        }
        
        .channel-active {
            background: linear-gradient(135deg, rgba(88, 101, 242, 0.3), rgba(88, 101, 242, 0.1));
            border-left: 3px solid #5865F2;
        }
        
        .message {
            transition: all 0.2s ease;
            border-radius: 8px;
        }
        
        .message:hover {
            background: rgba(88, 101, 242, 0.1);
            transform: translateX(4px);
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(88, 101, 242, 0.5);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(88, 101, 242, 0.8);
        }
        
        .modern-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .modern-input:focus {
            outline: none;
            border-color: #5865F2;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(88, 101, 242, 0.1);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #5865F2, #4752C4);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(88, 101, 242, 0.3);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .fade-in-up {
            animation: fadeInUp 0.5s ease-out;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .guest-badge {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ==================== DỮ LIỆU KHỞI TẠO ====================
        let currentUser = null;
        let users = [];
        let messages = [];
        let channels = [];
        let currentChannel = 'general';
        
        // Load dữ liệu từ localStorage
        function loadData() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser && savedUser !== 'null') {
                try {
                    currentUser = JSON.parse(savedUser);
                } catch(e) { currentUser = null; }
            } else {
                currentUser = null;
            }
            
            const savedUsers = localStorage.getItem('users');
            if (savedUsers) {
                users = JSON.parse(savedUsers);
            } else {
                users = [];
            }
            
            const savedMessages = localStorage.getItem('messages');
            if (savedMessages) {
                messages = JSON.parse(savedMessages);
            } else {
                messages = [];
            }
            
            const savedChannels = localStorage.getItem('channels');
            if (savedChannels) {
                channels = JSON.parse(savedChannels);
            } else {
                channels = [];
            }
            
            const savedChannel = localStorage.getItem('currentChannel');
            if (savedChannel && savedChannel !== 'null') {
                currentChannel = savedChannel;
            } else {
                currentChannel = 'general';
            }
        }
        
        // Lưu dữ liệu
        function saveData() {
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('messages', JSON.stringify(messages));
            localStorage.setItem('channels', JSON.stringify(channels));
            localStorage.setItem('currentChannel', currentChannel);
        }
        
        // Tạo dữ liệu mặc định nếu chưa có
        function initDefaultData() {
            if (users.length === 0) {
                users = [
                    { id: '1', username: 'cogiaochunhiem', password: '123456', role: 'teacher', avatar: '👩‍🏫', email: 'cogiao@8e.edu.vn' },
                    { id: '2', username: 'minh_anh', password: '123456', role: 'student', avatar: '👧', email: 'minhanh@8e.edu.vn' },
                    { id: '3', username: 'duc_huy', password: '123456', role: 'student', avatar: '👦', email: 'duchuy@8e.edu.vn' }
                ];
            }
            
            if (channels.length === 0) {
                channels = [
                    { id: 'general', name: 'chung', icon: '#', description: 'Nơi trò chuyện chung của lớp 8E' },
                    { id: 'homework', name: 'bài tập', icon: '📝', description: 'Thảo luận bài tập và kiến thức' },
                    { id: 'announcements', name: 'thông báo', icon: '📢', description: 'Thông báo quan trọng từ giáo viên' },
                    { id: 'random', name: 'random', icon: '🎮', description: 'Giao lưu, giải trí' }
                ];
            }
            
            if (messages.length === 0) {
                messages = [
                    { id: '1', username: 'cogiaochunhiem', content: '✨ Chào mừng các em đến với Lớp 8E! ✨', channel: 'general', timestamp: new Date(Date.now() - 3600000).toISOString() },
                    { id: '2', username: 'cogiaochunhiem', content: '💡 Các em nhớ đăng nhập để có thể nhắn tin nhé!', channel: 'general', timestamp: new Date(Date.now() - 3500000).toISOString() },
                    { id: '3', username: 'minh_anh', content: 'Chào cô và các bạn! 👋', channel: 'general', timestamp: new Date(Date.now() - 3400000).toISOString() }
                ];
            }
            
            saveData();
        }
        
        // Format thời gian
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'vừa xong';
            if (diff < 3600000) return `${Math.floor(diff / 60000)} phút trước`;
            if (diff < 86400000) return `${Math.floor(diff / 3600000)} giờ trước`;
            return date.toLocaleDateString('vi-VN');
        }
        
        function getUserAvatar(username) {
            const user = users.find(u => u.username === username);
            if (user && user.avatar) return user.avatar;
            return '👤';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Gửi tin nhắn
        function sendMessage() {
            if (!currentUser) {
                alert('🔐 Vui lòng đăng nhập để nhắn tin!');
                return false;
            }
            
            const input = document.getElementById('messageInput');
            if (!input) return false;
            
            const content = input.value.trim();
            if (!content) return false;
            
            const newMessage = {
                id: Date.now().toString() + Math.random(),
                username: currentUser.username,
                content: content,
                channel: currentChannel,
                timestamp: new Date().toISOString()
            };
            
            messages.push(newMessage);
            saveData();
            input.value = '';
            renderApp();
            
            setTimeout(() => {
                const container = document.getElementById('messagesContainer');
                if (container) container.scrollTop = container.scrollHeight;
            }, 100);
            
            return true;
        }
        
        // Xóa tin nhắn
        function deleteMessage(msgId) {
            if (!currentUser) return;
            const msg = messages.find(m => m.id === msgId);
            if (msg && (msg.username === currentUser.username || currentUser.role === 'teacher')) {
                if (confirm('Xóa tin nhắn này?')) {
                    messages = messages.filter(m => m.id !== msgId);
                    saveData();
                    renderApp();
                }
            }
        }
        
        // Tạo phòng chat mới
        function createNewChannel() {
            if (!currentUser) {
                alert('🔐 Vui lòng đăng nhập để tạo phòng chat!');
                return;
            }
            
            const id = prompt('🏷️ Tên phòng (không dấu, VD: hoc_tap):', '');
            if (!id) return;
            
            const name = prompt('📛 Tên hiển thị (VD: Học tập):', id);
            if (!name) return;
            
            if (channels.find(c => c.id === id)) {
                alert('❌ Phòng chat đã tồn tại!');
                return;
            }
            
            channels.push({
                id: id,
                name: name,
                icon: '💬',
                description: `Phòng chat do ${currentUser.username} tạo`
            });
            
            saveData();
            currentChannel = id;
            renderApp();
        }
        
        // Đăng nhập
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            const user = users.find(u => u.username === username && u.password === password);
            if (user) {
                currentUser = { id: user.id, username: user.username, role: user.role, avatar: user.avatar };
                saveData();
                renderApp();
            } else {
                alert('❌ Sai tên đăng nhập hoặc mật khẩu!\n\n📝 Tài khoản mẫu:\n👩‍🏫 cogiaochunhiem / 123456\n👧 minh_anh / 123456');
            }
        }
        
        // Đăng ký
        function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            
            if (!username || !email || !password) {
                alert('❌ Vui lòng nhập đầy đủ thông tin!');
                return;
            }
            
            if (password !== confirm) {
                alert('❌ Mật khẩu xác nhận không khớp!');
                return;
            }
            
            if (password.length < 4) {
                alert('❌ Mật khẩu phải có ít nhất 4 ký tự!');
                return;
            }
            
            if (users.find(u => u.username === username)) {
                alert('❌ Tên đăng nhập đã tồn tại!');
                return;
            }
            
            const avatars = ['👨‍🎓', '👩‍🎓', '🧑‍🎓', '👧', '👦', '🌟', '⭐'];
            const newUser = {
                id: Date.now().toString(),
                username: username,
                email: email,
                password: password,
                role: 'student',
                avatar: avatars[Math.floor(Math.random() * avatars.length)]
            };
            
            users.push(newUser);
            saveData();
            
            alert('✅ Đăng ký thành công! Vui lòng đăng nhập.');
            window.showRegister = false;
            renderApp();
        }
        
        function logout() {
            currentUser = null;
            saveData();
            renderApp();
        }
        
        // ==================== GIAO DIỆN ====================
        
        function GuestWelcomeScreen() {
            return `
                <div class="min-h-screen flex items-center justify-center p-4 fade-in-up">
                    <div class="text-center max-w-2xl">
                        <div class="text-8xl mb-6 animate-bounce">📚</div>
                        <h1 class="text-5xl md:text-6xl font-bold bg-gradient-to-r from-[#5865F2] to-[#EB459E] bg-clip-text text-transparent mb-4">
                            Lớp 8E
                        </h1>
                        <p class="text-xl text-gray-300 mb-6">Nền tảng kết nối học tập hiện đại</p>
                        <div class="glass-card rounded-2xl p-6 mb-8">
                            <p class="text-gray-300 mb-3">✨ <strong class="text-white">Tham quan miễn phí</strong> - Xem nội dung lớp học</p>
                            <p class="text-sm text-gray-400">💡 Đăng nhập để nhắn tin và tạo phòng chat</p>
                        </div>
                        <div class="flex gap-4 justify-center flex-wrap">
                            <button id="guestViewBtn" class="px-6 py-3 rounded-xl glass hover:border-[#5865F2] transition font-semibold cursor-pointer">
                                👁️ Tham quan lớp học
                            </button>
                            <button id="showLoginBtn" class="px-6 py-3 rounded-xl btn-primary text-white font-semibold cursor-pointer">
                                🔑 Đăng nhập
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function LoginScreen() {
            return `
                <div class="min-h-screen flex items-center justify-center p-4 fade-in-up">
                    <div class="glass-card rounded-2xl p-8 w-full max-w-md">
                        <div class="text-center mb-8">
                            <div class="text-6xl mb-3">🔐</div>
                            <h2 class="text-3xl font-bold text-white mb-2">Chào mừng trở lại</h2>
                            <p class="text-gray-400">Đăng nhập để tham gia lớp 8E</p>
                        </div>
                        
                        <form id="loginForm">
                            <div class="mb-4">
                                <label class="block text-sm font-semibold text-gray-300 mb-2">Tên đăng nhập</label>
                                <input type="text" id="loginUsername" class="modern-input w-full rounded-xl p-3 text-white" placeholder="cogiaochunhiem" autocomplete="off">
                            </div>
                            <div class="mb-6">
                                <label class="block text-sm font-semibold text-gray-300 mb-2">Mật khẩu</label>
                                <input type="password" id="loginPassword" class="modern-input w-full rounded-xl p-3 text-white" placeholder="••••••">
                            </div>
                            <button type="submit" class="btn-primary w-full py-3 rounded-xl text-white font-semibold cursor-pointer">Đăng nhập</button>
                        </form>
                        
                        <div class="text-center mt-6">
                            <span class="text-gray-400">Chưa có tài khoản? </span>
                            <button id="showRegisterBtn" class="text-[#5865F2] hover:underline font-semibold cursor-pointer">Đăng ký ngay</button>
                        </div>
                        
                        <div class="mt-6 p-4 glass rounded-xl text-sm">
                            <p class="font-semibold text-gray-300 mb-2">📝 Tài khoản mẫu:</p>
                            <p class="text-gray-400">👩‍🏫 Giáo viên: <strong class="text-white">cogiaochunhiem</strong> / 123456</p>
                            <p class="text-gray-400">👧 Học sinh: <strong class="text-white">minh_anh</strong> / 123456</p>
                            <p class="text-gray-400">👦 Học sinh: <strong class="text-white">duc_huy</strong> / 123456</p>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function RegisterScreen() {
            return `
                <div class="min-h-screen flex items-center justify-center p-4 fade-in-up">
                    <div class="glass-card rounded-2xl p-8 w-full max-w-md">
                        <div class="text-center mb-8">
                            <div class="text-6xl mb-3">📝</div>
                            <h2 class="text-3xl font-bold text-white mb-2">Tham gia lớp 8E</h2>
                            <p class="text-gray-400">Tạo tài khoản miễn phí</p>
                        </div>
                        
                        <form id="registerForm">
                            <div class="mb-4">
                                <label class="block text-sm font-semibold text-gray-300 mb-2">Tên đăng nhập</label>
                                <input type="text" id="regUsername" class="modern-input w-full rounded-xl p-3 text-white" placeholder="ten_cua_ban" autocomplete="off">
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-semibold text-gray-300 mb-2">Email</label>
                                <input type="email" id="regEmail" class="modern-input w-full rounded-xl p-3 text-white" placeholder="email@example.com">
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-semibold text-gray-300 mb-2">Mật khẩu</label>
                                <input type="password" id="regPassword" class="modern-input w-full rounded-xl p-3 text-white" placeholder="•••••• (ít nhất 4 ký tự)">
                            </div>
                            <div class="mb-6">
                                <label class="block text-sm font-semibold text-gray-300 mb-2">Xác nhận mật khẩu</label>
                                <input type="password" id="regConfirmPassword" class="modern-input w-full rounded-xl p-3 text-white" placeholder="••••••">
                            </div>
                            <button type="submit" class="btn-primary w-full py-3 rounded-xl text-white font-semibold cursor-pointer">Đăng ký</button>
                        </form>
                        
                        <div class="text-center mt-6">
                            <span class="text-gray-400">Đã có tài khoản? </span>
                            <button id="showLoginBtn" class="text-[#5865F2] hover:underline font-semibold cursor-pointer">Đăng nhập</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function ChatScreen() {
            const channelMessages = messages.filter(m => m.channel === currentChannel);
            const currentChannelInfo = channels.find(c => c.id === currentChannel);
            const isTeacher = currentUser?.role === 'teacher';
            const isGuest = !currentUser;
            
            return `
                <div class="flex h-screen">
                    <div class="w-72 sidebar-modern flex flex-col">
                        <div class="p-5 border-b border-white/5">
                            <div class="flex items-center justify-between">
                                <div>
                                    <h1 class="text-xl font-bold bg-gradient-to-r from-[#5865F2] to-[#EB459E] bg-clip-text text-transparent">Lớp 8E</h1>
                                    <p class="text-xs text-gray-400 mt-1">Học tập & Kết nối</p>
                                </div>
                                ${!isGuest ? `<div class="text-3xl">${currentUser.avatar}</div>` : '<div class="guest-badge text-2xl">👁️</div>'}
                            </div>
                            
                            ${!isGuest ? `
                                <div class="mt-3 p-2 glass rounded-lg">
                                    <div class="flex items-center gap-2">
                                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                        <span class="text-sm font-medium">${currentUser.username}</span>
                                        ${isTeacher ? '<span class="text-xs bg-[#5865F2] px-2 py-0.5 rounded-full">Giáo viên</span>' : '<span class="text-xs bg-gray-600 px-2 py-0.5 rounded-full">Học sinh</span>'}
                                    </div>
                                </div>
                            ` : `
                                <div class="mt-3 p-2 glass rounded-lg text-center">
                                    <p class="text-xs text-gray-400">👁️ Đang tham quan</p>
                                    <button id="guestLoginBtn" class="text-xs text-[#5865F2] hover:underline mt-1 cursor-pointer">Đăng nhập để nhắn tin →</button>
                                </div>
                            `}
                        </div>
                        
                        <div class="flex-1 overflow-y-auto p-3">
                            <div class="flex items-center justify-between mb-3 px-2">
                                <div class="text-xs uppercase font-semibold text-gray-400">Kênh văn bản</div>
                                ${!isGuest ? `
                                    <button id="createChannelBtn" class="text-gray-400 hover:text-white transition text-xl cursor-pointer">+</button>
                                ` : `
                                    <span class="text-gray-500 text-xs">🔒</span>
                                `}
                            </div>
                            
                            ${channels.map(ch => `
                                <div class="channel-item ${currentChannel === ch.id ? 'channel-active' : ''} p-2 mb-1 cursor-pointer flex items-center gap-2" data-channel="${ch.id}">
                                    <span class="text-lg">${ch.icon === '#' ? '#' : ch.icon}</span>
                                    <span class="flex-1 text-sm">${ch.name}</span>
                                    <span class="text-xs text-gray-500">${messages.filter(m => m.channel === ch.id).length}</span>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="p-3 border-t border-white/5">
                            ${!isGuest ? `
                                <button id="logoutBtn" class="w-full text-left text-gray-400 hover:text-white text-sm py-2 px-2 rounded-lg hover:bg-white/5 transition flex items-center gap-2 cursor-pointer">
                                    <span>🚪</span> Đăng xuất
                                </button>
                            ` : `
                                <button id="guestToLoginBtn" class="w-full text-left text-[#5865F2] hover:text-white text-sm py-2 px-2 rounded-lg hover:bg-white/5 transition flex items-center gap-2 cursor-pointer">
                                    <span>🔑</span> Đăng nhập
                                </button>
                            `}
                        </div>
                    </div>
                    
                    <div class="flex-1 flex flex-col">
                        <div class="h-14 border-b border-white/5 flex items-center px-6 glass">
                            <span class="text-2xl mr-3">${currentChannelInfo?.icon || '#'}</span>
                            <div>
                                <div class="font-semibold">${currentChannelInfo?.name || currentChannel}</div>
                                <div class="text-xs text-gray-400">${currentChannelInfo?.description || 'Kênh trò chuyện'}</div>
                            </div>
                        </div>
                        
                        <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 space-y-2">
                            ${channelMessages.length === 0 ? `
                                <div class="text-center text-gray-500 py-20">
                                    <div class="text-6xl mb-4">💬</div>
                                    <p>Chưa có tin nhắn nào</p>
                                    <p class="text-sm mt-2">Hãy là người đầu tiên nhắn tin!</p>
                                </div>
                            ` : channelMessages.slice().reverse().map(msg => `
                                <div class="message p-3 rounded-lg transition group">
                                    <div class="flex gap-3">
                                        <div class="text-3xl">${getUserAvatar(msg.username)}</div>
                                        <div class="flex-1">
                                            <div class="flex items-baseline gap-2 flex-wrap">
                                                <span class="font-semibold">${msg.username}</span>
                                                <span class="text-xs text-gray-400">${formatTime(msg.timestamp)}</span>
                                                ${msg.username === currentUser?.username || isTeacher ? 
                                                    `<button class="delete-msg opacity-0 group-hover:opacity-100 text-red-400 text-xs ml-2 transition cursor-pointer" data-msg-id="${msg.id}">🗑️ Xóa</button>` 
                                                    : ''}
                                                ${msg.username === 'cogiaochunhiem' ? '<span class="text-xs bg-[#5865F2] px-1.5 py-0.5 rounded-full">GV</span>' : ''}
                                            </div>
                                            <div class="text-gray-200 break-words mt-1">${escapeHtml(msg.content)}</div>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="p-4 border-t border-white/5">
                            <div class="glass rounded-xl flex items-center">
                                <input type="text" id="messageInput" class="flex-1 bg-transparent text-white p-3 outline-none rounded-xl" 
                                    placeholder="${isGuest ? '🔒 Đăng nhập để nhắn tin...' : 'Nhập tin nhắn...'}" 
                                    ${isGuest ? 'disabled' : ''} autocomplete="off">
                                <button id="sendBtn" class="btn-primary text-white px-5 py-2 m-1 rounded-xl transition font-semibold cursor-pointer" ${isGuest ? 'disabled' : ''}>
                                    Gửi
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // ==================== RENDER CHÍNH ====================
        let currentView = 'welcome'; // welcome, login, register, guest, chat
        
        function renderApp() {
            loadData();
            
            const app = document.getElementById('app');
            let html = '';
            
            if (currentUser) {
                html = ChatScreen();
                currentView = 'chat';
            } else if (currentView === 'login') {
                html = LoginScreen();
            } else if (currentView === 'register') {
                html = RegisterScreen();
            } else if (currentView === 'guest') {
                html = ChatScreen();
            } else {
                html = GuestWelcomeScreen();
                currentView = 'welcome';
            }
            
            app.innerHTML = html;
            attachEvents();
        }
        
        function attachEvents() {
            if (currentView === 'welcome') {
                const guestBtn = document.getElementById('guestViewBtn');
                const loginBtn = document.getElementById('showLoginBtn');
                if (guestBtn) guestBtn.onclick = () => { currentView = 'guest'; renderApp(); };
                if (loginBtn) loginBtn.onclick = () => { currentView = 'login'; renderApp(); };
            }
            else if (currentView === 'login') {
                const form = document.getElementById('loginForm');
                if (form) form.onsubmit = handleLogin;
                const registerBtn = document.getElementById('showRegisterBtn');
                if (registerBtn) registerBtn.onclick = () => { currentView = 'register'; renderApp(); };
            }
            else if (currentView === 'register') {
                const form = document.getElementById('registerForm');
                if (form) form.onsubmit = handleRegister;
                const loginBtn = document.getElementById('showLoginBtn');
                if (loginBtn) loginBtn.onclick = () => { currentView = 'login'; renderApp(); };
            }
            else if (currentView === 'guest' || currentView === 'chat') {
                // Chuyển kênh
                document.querySelectorAll('.channel-item').forEach(el => {
                    el.onclick = () => {
                        const channel = el.dataset.channel;
                        if (channel) {
                            currentChannel = channel;
                            saveData();
                            renderApp();
                        }
                    };
                });
                
                // Nút đăng nhập trong guest mode
                const guestLoginBtn = document.getElementById('guestLoginBtn');
                const guestToLoginBtn = document.getElementById('guestToLoginBtn');
                if (guestLoginBtn) guestLoginBtn.onclick = () => { currentView = 'login'; renderApp(); };
                if (guestToLoginBtn) guestToLoginBtn.onclick = () => { currentView = 'login'; renderApp(); };
                
                // Nút đăng xuất
                const logoutBtn = document.getElementById('logoutBtn');
                if (logoutBtn) logoutBtn.onclick = logout;
                
                // Tạo phòng
                const createBtn = document.getElementById('createChannelBtn');
                if (createBtn) createBtn.onclick = createNewChannel;
                
                // Gửi tin nhắn
                const sendBtn = document.getElementById('sendBtn');
                const msgInput = document.getElementById('messageInput');
                if (sendBtn) sendBtn.onclick = sendMessage;
                if (msgInput) msgInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
                
                // Xóa tin nhắn
                document.querySelectorAll('.delete-msg').forEach(btn => {
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        deleteMessage(btn.dataset.msgId);
                    };
                });
                
                // Auto scroll
                const container = document.getElementById('messagesContainer');
                if (container) container.scrollTop = container.scrollHeight;
            }
        }
        
        // Khởi động
        loadData();
        initDefaultData();
        renderApp();
    </script>
</body>
</html>
